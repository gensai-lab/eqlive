<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 146px;
        }

        #container {
            position: relative;
            width: 600px;
            height: 146px;
        }

        .yobikake-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 600px;
            height: 146px;
            opacity: 0;
            transition: opacity 2s ease-in-out; /* 2秒間のクロスフェード */
            object-fit: contain;
        }

        .yobikake-img.active {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
    const FADE_INTERVAL = 10000; // 10秒ごとに切り替え
    let currentLevel = null;
    let currentIndex = 0;
    let timer = null;

    // 指定されたファイル名規則に基づく設定
    const config = {
        MajorWarning: {
            count: 5,
            prefix: 'assets/banner/yobikake/tsunami-yk_o' // o1.svg ~ o5.svg
        },
        Warning: {
            count: 5,
            prefix: 'assets/banner/yobikake/tsunami-yk_k' // k1.svg ~ k5.svg
        },
        Watch: {
            count: 3,
            prefix: 'assets/banner/yobikake/tsunami-yk_c' // c1.svg ~ c3.svg
        }
    };

    /**
     * 表示する警報レベルを更新し、画像を生成する
     */
    function updateDisplay(level) {
        if (currentLevel === level) return;
        
        currentLevel = level;
        const container = document.getElementById('container');
        container.innerHTML = '';
        
        if (!config[level]) {
            if (timer) clearInterval(timer);
            return;
        }

        // 画像要素を生成 (1始まりのインデックスでファイル名を指定)
        for (let i = 1; i <= config[level].count; i++) {
            const img = document.createElement('img');
            img.src = `${config[level].prefix}${i}.svg`;
            img.className = 'yobikake-img';
            if (i === 1) img.classList.add('active');
            container.appendChild(img);
        }

        currentIndex = 0;
        startLoop();
    }

    /**
     * 10秒ごとのループ処理（最後に来たら最初に戻る）
     */
    function startLoop() {
        if (timer) clearInterval(timer);
        
        const imgs = document.querySelectorAll('.yobikake-img');
        if (imgs.length <= 1) return;

        timer = setInterval(() => {
            // 現在の画像を非表示に
            imgs[currentIndex].classList.remove('active');
            
            // 次のインデックスへ（最大枚数を超えたら0に戻る）
            currentIndex = (currentIndex + 1) % imgs.length;
            
            // 次の画像を表示
            imgs[currentIndex].classList.add('active');
        }, FADE_INTERVAL);
    }

    /**
     * 外部（index.html）からのデータ連携用
     */
    window.updateTsunamiYobikake = (dataArray) => {
        if (!dataArray || dataArray.length === 0) {
            updateDisplay(null);
            return;
        }

        const activeInfo = dataArray.find(d => d.code === 552 && !d.cancelled);
        if (!activeInfo) {
            updateDisplay(null);
            return;
        }

        // 優先順位判定
        let highestGrade = null;
        const grades = activeInfo.areas.map(a => a.grade);

        if (grades.includes('MajorWarning')) highestGrade = 'MajorWarning';
        else if (grades.includes('Warning')) highestGrade = 'Warning';
        else if (grades.includes('Watch')) highestGrade = 'Watch';

        updateDisplay(highestGrade);
    };

    // テスト用（必要に応じてコメントアウトを外して確認してください）
    window.onload = () => updateDisplay('MajorWarning');
</script>

</body>
</html>
