<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kactuif - Live Background</title>
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: black;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* 映像背景エリア */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #live-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 中継テロップエリア */
        .relay-info {
            position: absolute;
            top: 145px;
            left: 65px;
            z-index: 10;
            display: flex;
            align-items: center;
            visibility: hidden;
        }

        .relay-banner {
            height: 54px;
            width: auto;
            margin-right: 15px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .relay-location {
            color: white;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,1), -2px -2px 4px rgba(0,0,0,1);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="video-background">
    <!-- videoタグに変更 -->
    <video id="live-video" muted playsinline></video>
</div>

<div class="relay-info" id="relay-container">
    <img src="assets/banner/live.svg" class="relay-banner" alt="中継">
    <div class="relay-location" id="location-text">読込中...</div>
</div>

<!-- HLS.js ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const video = document.getElementById('live-video');
    const locationText = document.getElementById('location-text');
    const relayContainer = document.getElementById('relay-container');
    let hls = null;
    let currentUrl = "";

    onValue(ref(db, 'broadcast/current/camera'), (snapshot) => {
        const data = snapshot.val();
        
        // 場所名の更新
        if (data && data.location) {
            locationText.innerText = data.location;
            relayContainer.style.visibility = "visible";
        } else {
            relayContainer.style.visibility = "hidden";
        }

        // 映像URLの更新（URLが変わった時だけ処理）
        if (data && data.url && data.url !== currentUrl) {
            currentUrl = data.url;
            playHLS(data.url);
        }
    });

    function playHLS(url) {
        if (Hls.isSupported()) {
            if (hls) hls.destroy(); // 既存の接続を破棄
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("再生失敗:", e));
            });
            
            // エラーハンドリング（再接続試行など）
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("ネットワークエラー。再試行中...");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("メディアエラー。復旧中...");
                            hls.recoverMediaError();
                            break;
                        default:
                            playHLS(url);
                            break;
                    }
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // SafariなどのHLSネイティブ対応ブラウザ用
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
            });
        }
    }
</script>

</body>
</html>
