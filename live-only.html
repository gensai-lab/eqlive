<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px; /* 基本はフルHDサイズで設計 */
            height: 1080px;
            overflow: hidden;
            background-color: black;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* 映像背景エリア */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ダミー映像（imgまたはiframe） */
        #live-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 中継テロップエリア */
        .relay-info {
            position: absolute;
            top: 150px; /* 時計の下あたりに配置 */
            left: 70px;
            z-index: 10;
            display: flex;
            align-items: center;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            visibility: hidden; /* データ読み込みまで非表示 */
        }

        /* 「中継」ラベル */
        .relay-label {
            background-color: #ff0000;
            color: white;
            padding: 5px 15px;
            font-size: 38px;
            font-weight: bold;
            border-radius: 6px;
            margin-right: 15px;
            letter-spacing: 2px;
        }

        /* 中継場所名 */
        .relay-location {
            color: white;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,1), -2px -2px 4px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

<div class="video-background">
    <!-- 実際にはYouTubeの埋め込みやWebRTCの映像ソースが入ります -->
    <img id="live-video" src="./assets/cam/default.jpg" alt="Live Camera">
</div>

<div class="relay-info" id="relay-container">
    <div class="relay-label">中継</div>
    <div class="relay-location" id="location-text">読込中...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const locationText = document.getElementById('location-text');
    const relayContainer = document.getElementById('relay-container');
    const liveVideo = document.getElementById('live-video');

    // 中継場所情報の監視
    onValue(ref(db, 'broadcast/current/camera'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.location) {
            locationText.innerText = data.location;
            relayContainer.style.visibility = "visible";
            
            // 映像ソース（パスやURL）もAdminから切り替える場合
            if (data.src) {
                liveVideo.src = data.src;
            }
        } else {
            relayContainer.style.visibility = "hidden";
        }
    });
</script>

</body>
</html>
