<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
            color: #000;
        }

        .tsunami-list-container {
            width: 800px;
            background-color: #fff;
            margin: 0;
            padding: 0;
            border: none;
        }

        .list-header {
            width: 800px;
            line-height: 0;
        }

        .list-header img {
            width: 100%;
            display: block;
        }

        .list-row {
            display: grid;
            /* 比率：地名 400px / 時刻 250px / 高さ 150px */
            grid-template-columns: 400px 250px 150px;
            border-bottom: 2px solid #ccc;
            align-items: center; /* 垂直中央揃え */
            min-height: 80px; /* 最低限の高さ */
            margin: 0;
            padding: 0;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .area-name-container {
            width: 400px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .area-name {
            font-size: 36px;
            font-weight: bold;
            white-space: nowrap;
            display: inline-block;
            transform-origin: left center;
        }

        /* 到達予想時刻：背景なし・黒文字 */
        .arrival-time {
            width: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #000;
            background-color: transparent;
        }

        /* 高さエリア：画像の横幅を150pxに固定、縦はauto */
        .tsunami-height {
            width: 150px;
            line-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tsunami-height img {
            width: 150px; /* 横幅をセルに合わせる */
            height: auto;  /* 縦幅は自動 */
            display: block;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <div class="list-header">
        <img id="headerImg" src="assets/banner/tsunami/tsunami_list-kt.png" alt="Header">
    </div>
    <div id="listBody"></div>
</div>

<script>
    function adjustTextScale(element, maxWidth) {
        const currentWidth = element.offsetWidth;
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        } else {
            element.style.transform = 'scaleX(1)';
        }
    }

    window.updateTsunamiList = (type, areas) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        headerImg.src = `assets/banner/tsunami/tsunami_list-${type}.png`;
        body.innerHTML = '';

        areas.forEach(area => {
            let heightImgSrc = 'assets/banner/tsunami/tsunami_list-none.png';
            const h = area.height;

            if (h === '10m超') heightImgSrc = 'assets/banner/tsunami/tsunami_list-10mu.png';
            else if (h === '10m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-10m.png';
            else if (h === '5m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-5m.png';
            else if (h === '巨大') heightImgSrc = 'assets/banner/tsunami/tsunami_list-kyodai.png';
            else if (h === '3m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-3m.png';
            else if (h === '高い') heightImgSrc = 'assets/banner/tsunami/tsunami_list-takai.png';
            else if (h === '1m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-1m.png';

            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div class="area-name-container">
                    <span class="area-name">${area.name}</span>
                </div>
                <div class="arrival-time">${area.time}</div>
                <div class="tsunami-height">
                    <img src="${heightImgSrc}" alt="${h}">
                </div>
            `;
            body.appendChild(row);

            const nameSpan = row.querySelector('.area-name');
            adjustTextScale(nameSpan, 370);
        });
    };

    // テスト実行
    window.addEventListener('load', () => {
        const testAreas = [
            { name: '北海道太平洋沿岸東部', time: 'すぐ来る', height: '10m超' },
            { name: '鹿児島県奄美群島・トカラ列島', time: '2日 22:22', height: '5m' },
            { name: '岩手県', time: '2日 22:50', height: '巨大' }
        ];
        updateTsunamiList('ot', testAreas);
    });
</script>

</body>
</html>
