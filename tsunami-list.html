z<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        /* リスト全体のコンテナ */
        .tsunami-list-container {
            width: 800px;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            background-color: #fff; /* 背景を白に固定 */
        }

        /* ヘッダーおよびリスト内の各画像共通設定 */
        .list-image-item {
            width: 800px; /* 横幅をヘッダーに揃える */
            line-height: 0; /* 画像間の微細な隙間を排除 */
        }

        .list-image-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <!-- ヘッダー画像 -->
    <div class="list-image-item">
        <img id="headerImg" src="assets/banner/tsunami/tsunami_list-ot.png" alt="Header">
    </div>

    <!-- リスト画像（5個） -->
    <div id="listBody">
        <!-- JavaScriptで画像を5個生成します -->
    </div>
</div>

<script>
    /**
     * リストを画像のみで構成する関数
     * @param {string} type - 'ot', 'kt', 'ct'
     * @param {Array} heightTypes - 表示したい高さアセットの種類の配列（5個）
     */
    window.updateTsunamiImageList = (type, heightTypes) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        // ヘッダーの切り替え
        headerImg.src = `assets/banner/tsunami/tsunami_list-${type}.png`;

        // リストの中身をクリアして画像を5個配置
        body.innerHTML = '';
        
        heightTypes.forEach(hType => {
            const wrapper = document.createElement('div');
            wrapper.className = 'list-image-item';
            
            // アセット名に基づいた画像パスを生成
            // 例: '5m' -> assets/banner/tsunami/tsunami_list-5m.png
            const imgSrc = `assets/banner/tsunami/tsunami_list-${hType}.png`;
            
            wrapper.innerHTML = `<img src="${imgSrc}" alt="${hType}">`;
            body.appendChild(wrapper);
        });
    };

    // --- テスト実行 ---
    window.addEventListener('load', () => {
        // 例として大津波警報(ot)の下に、異なる高さの画像を5個並べます
        const testHeights = [
            '10mu',   // 10m超
            '10m',    // 10m
            '5m',     // 5m
            'kyodai', // 巨大
            '3m'      // 3m
        ];
        
        updateTsunamiImageList('ot', testHeights);
    });
</script>

</body>
</html>
