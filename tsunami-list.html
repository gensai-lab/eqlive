<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
            color: #000;
        }

        /* リスト全体のコンテナ */
        .tsunami-list-container {
            width: 800px; /* 画像の比率に合わせて調整 */
            border: 4px solid #fff;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ヘッダー部分（津波警報 | 到達予想 | 高さ） */
        .list-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.8fr;
            background-color: #DE080A; /* 警報色 */
            color: #fff;
            padding: 10px 20px;
            font-size: 40px;
            font-weight: bold;
            align-items: center;
        }

        .header-divider {
            font-weight: normal;
            margin: 0 10px;
            opacity: 0.8;
        }

        /* 各行の設定 */
        .list-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.8fr;
            border-bottom: 2px solid #DE080A;
            align-items: stretch;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        /* 予報区名 */
        .area-name {
            padding: 15px 20px;
            font-size: 38px;
            font-weight: bold;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* 到達予想時刻のボックス */
        .arrival-time {
            background-color: #FEDC00; /* 注意報色（黄色） */
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 高さのボックス */
        .tsunami-height {
            background-color: #DE080A;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <!-- ヘッダー -->
    <div class="list-header" id="listHeader">
        <div>津波警報</div>
        <div style="text-align: center;"><span class="header-divider">|</span>到達予想<span class="header-divider">|</span></div>
        <div style="text-align: center;">高さ</div>
    </div>

    <!-- リストの中身（JavaScriptで生成） -->
    <div id="listBody">
        <!-- サンプル行 -->
        <div class="list-row">
            <div class="area-name">北海道太平洋沿岸中部</div>
            <div class="arrival-time">22日 22:22</div>
            <div class="tsunami-height">3m</div>
        </div>
        <!-- 繰り返し -->
    </div>
</div>

<script>
    // 外部からリストを更新するための関数
    window.updateTsunamiList = (title, areas) => {
        const header = document.getElementById('listHeader');
        const body = document.getElementById('listBody');
        
        // ヘッダータイトルの更新（大津波警報なら色を変えるなど）
        header.firstElementChild.innerText = title;
        if (title.includes("大津波")) {
            header.style.backgroundColor = "#C91EFB";
        } else {
            header.style.backgroundColor = "#DE080A";
        }

        // リストの生成
        body.innerHTML = '';
        areas.forEach(area => {
            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div class="area-name">${area.name}</div>
                <div class="arrival-time">${area.time}</div>
                <div class="tsunami-height">${area.height}</div>
            `;
            body.appendChild(row);
        });
    };

    // 初期表示用のテスト（実際にはFirebase等から呼ぶ）
    /*
    updateTsunamiList("津波警報", [
        { name: "北海道太平洋沿岸中部", time: "22日 22:22", height: "3m" },
        { name: "北海道太平洋沿岸中部", time: "22日 22:22", height: "3m" },
        { name: "北海道太平洋沿岸中部", time: "22日 22:22", height: "3m" },
        { name: "北海道太平洋沿岸中部", time: "22日 22:22", height: "3m" },
        { name: "北海道太平洋沿岸中部", time: "22日 22:22", height: "3m" }
    ]);
    */
</script>

</body>
</html>
