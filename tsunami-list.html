<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoDB';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'UDKakugoDB', sans-serif;
            font-weight: 400;
            font-feature-settings: "palt";
        }

        .tsunami-list-container {
            width: 600px;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .list-item-wrapper {
            position: relative;
            width: 600px;
            line-height: 0;
            margin: 0;
            padding: 0;
        }

        .list-item-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            line-height: normal;
            color: #000;
            white-space: nowrap;
            pointer-events: none;
        }

        .area-name-overlay {
            left: -3px;
            width: 300px;
            padding-left: 15px;
            font-size: 32px;
            overflow: hidden;
        }

        .area-text {
            display: inline-block;
            transform-origin: left center;
        }

        .arrival-time-overlay {
            left: 303px;
            width: 190px;
            justify-content: center;
            font-size: 32px;
            letter-spacing: -0.2px;
        }

        .time-text {
            display: inline-block;
            transform-origin: center center;
        }

        .date-unit {
            font-size: 0.6em;
            margin-right: 0.1em;
            vertical-align: baseline;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <div class="list-item-wrapper">
        <img id="headerImg" src="assets/banner/tsunami/tsunami-list_ot.svg" alt="Header">
    </div>
    <div id="listBody"></div>
</div>

<script>
    const PAGE_INTERVAL = 20000; // 20秒
    const ITEMS_PER_PAGE = 5;

    const timeTextDictionary = {
        'ただちに津波来襲と予測': 'すぐ来る',
        '第１波の到達を確認': '第1波到達',
        '津波到達中と推測': '到達中'
    };

    let currentPageLoop = null;
    let allPages = [];
    let currentPageIndex = 0;

    function formatTimeText(text) {
        let display = timeTextDictionary[text] || text;
        if (display && display.includes('日')) {
            display = display.replace(/日/g, '<span class="date-unit">日</span>');
        }
        return display;
    }

    function adjustTextScale(element, maxWidth) {
        element.style.transform = 'scaleX(1)';
        const currentWidth = element.offsetWidth;
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        }
    }

    function getTsunamiSvgName(heightStr) {
        if (!heightStr || heightStr === '不明') return 'none';
        if (heightStr === '10m超') return '10mu';
        if (heightStr === '10m') return '10m';
        if (heightStr === '5m') return '5m';
        if (heightStr === '3m') return '3m';
        if (heightStr === '1m') return '1m';
        if (heightStr === '巨大') return 'kyodai';
        if (heightStr === '高い') return 'takai';
        return 'none';
    }

    function renderPage(pageData) {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        headerImg.src = `assets/banner/tsunami/tsunami-list_${pageData.type}.svg`;
        body.innerHTML = '';

        pageData.items.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'list-item-wrapper';
            
            const hFile = getTsunamiSvgName(item.height);
            const imgSrc = `assets/banner/tsunami/tsunami-list_${hFile}.svg`;
            const displayTimeHTML = formatTimeText(item.time);
            
            wrapper.innerHTML = `
                <img src="${imgSrc}" alt="${hFile}">
                <div class="overlay area-name-overlay">
                    <span class="area-text">${item.area}</span>
                </div>
                <div class="overlay arrival-time-overlay">
                    <span class="time-text">${displayTimeHTML}</span>
                </div>
            `;
            body.appendChild(wrapper);

            adjustTextScale(wrapper.querySelector('.area-text'), 270); 
            adjustTextScale(wrapper.querySelector('.time-text'), 175);
        });
    }

    function startPageLoop() {
        if (currentPageLoop) clearInterval(currentPageLoop);
        if (allPages.length === 0) return;

        currentPageIndex = 0;
        renderPage(allPages[currentPageIndex]);

        if (allPages.length > 1) {
            currentPageLoop = setInterval(() => {
                currentPageIndex = (currentPageIndex + 1) % allPages.length;
                renderPage(allPages[currentPageIndex]);
            }, PAGE_INTERVAL);
        }
    }

    window.updateTsunamiList = (p2pData) => {
        const latestInfo = p2pData.find(d => d.code === 552 && !d.cancelled);
        if (!latestInfo) return;

        const groups = { ot: [], kt: [], ct: [] };

        latestInfo.areas.forEach(area => {
            const item = {
                area: area.name,
                time: area.firstHeightCondition || area.firstHeight?.condition || area.firstHeight?.arrivalTime || "",
                height: area.maxHeight ? area.maxHeight.description : '不明'
            };

            if (area.grade === 'MajorWarning') groups.ot.push(item);
            else if (area.grade === 'Warning') groups.kt.push(item);
            else if (area.grade === 'Watch') groups.ct.push(item);
        });

        allPages = [];
        ['ot', 'kt', 'ct'].forEach(type => {
            const list = groups[type];
            for (let i = 0; i < list.length; i += ITEMS_PER_PAGE) {
                allPages.push({
                    type: type,
                    items: list.slice(i, i + ITEMS_PER_PAGE)
                });
            }
        });

        startPageLoop();
    };

    // --- テスト用データ ---
    window.addEventListener('load', () => {
        const testP2P = [
            {
                "code": 552,
                "cancelled": false,
                "areas": [
                    // 大津波警報：8件（1～5件目が1ページ目、6～8件目が2ページ目）
                    { "name": "北海道太平洋沿岸東部", "grade": "MajorWarning", "maxHeight": { "description": "巨大" }, "firstHeight": { "condition": "ただちに津波来襲と予測" } },
                    { "name": "北海道太平洋沿岸中部", "grade": "MajorWarning", "maxHeight": { "description": "巨大" }, "firstHeight": { "condition": "ただちに津波来襲と予測" } },
                    { "name": "北海道太平洋沿岸西部", "grade": "MajorWarning", "maxHeight": { "description": "巨大" }, "firstHeight": { "condition": "ただちに津波来襲と予測" } },
                    { "name": "青森県太平洋沿岸", "grade": "MajorWarning", "maxHeight": { "description": "10m超" }, "firstHeight": { "condition": "第１波の到達を確認" } },
                    { "name": "岩手県", "grade": "MajorWarning", "maxHeight": { "description": "10m超" }, "firstHeight": { "condition": "津波到達中と推測" } },
                    { "name": "宮城県", "grade": "MajorWarning", "maxHeight": { "description": "10m" }, "firstHeight": { "condition": "3日 15:40" } },
                    { "name": "福島県", "grade": "MajorWarning", "maxHeight": { "description": "10m" }, "firstHeight": { "condition": "3日 15:50" } },
                    { "name": "茨城県", "grade": "MajorWarning", "maxHeight": { "description": "5m" }, "firstHeight": { "condition": "3日 16:00" } },

                    // 津波警報：2件
                    { "name": "千葉県九十九里・外房", "grade": "Warning", "maxHeight": { "description": "3m" }, "firstHeight": { "condition": "3日 16:15" } },
                    { "name": "相模湾・三浦半島", "grade": "Warning", "maxHeight": { "description": "3m" }, "firstHeight": { "condition": "3日 16:30" } },

                    // 津波注意報：2件
                    { "name": "伊豆諸島", "grade": "Watch", "maxHeight": { "description": "1m" }, "firstHeight": { "condition": "3日 16:40" } },
                    { "name": "小笠原諸島", "grade": "Watch", "maxHeight": { "description": "不明" }, "firstHeight": { "condition": "3日 17:00" } }
                ]
            }
        ];
        
        // データを流し込む
        window.updateTsunamiList(testP2P);
    });
</script>

</body>
</html>
