<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoDB';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            /* DBフォント、太さ400を指定 */
            font-family: 'UDKakugoDB', sans-serif;
            font-weight: 400;
        }

        .tsunami-list-container {
            width: 800px;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .list-item-wrapper {
            position: relative;
            width: 800px;
            line-height: 0;
            margin: 0;
            padding: 0;
        }

        /* SVG素材を表示 */
        .list-item-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        /* 共通テキスト設定 */
        .overlay {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            line-height: normal;
            color: #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 津波予報区名：左側に配置 */
        .area-name-overlay {
            left: 0;
            width: 400px;
            padding-left: 20px;
            font-size: 38px;
            overflow: hidden;
        }

        /* 到達予想時刻：中央（画像のデザインに合わせる）に配置 */
        .arrival-time-overlay {
            left: 400px;
            width: 250px;
            justify-content: center;
            font-size: 40px;
            letter-spacing: 1px;
        }

        .text-node {
            display: inline-block;
            transform-origin: left center;
        }

        /* 時刻用は中央基点で変形させる場合は center center */
        .time-node {
            display: inline-block;
            transform-origin: center center;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <!-- ヘッダー -->
    <div class="list-item-wrapper">
        <img id="headerImg" src="assets/banner/tsunami/tsunami_list-ot.svg" alt="Header">
    </div>

    <!-- リスト -->
    <div id="listBody"></div>
</div>

<script>
    /**
     * 文字の長体（圧縮）処理
     */
    function adjustTextScale(element, maxWidth) {
        const currentWidth = element.offsetWidth;
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        } else {
            element.style.transform = 'scaleX(1)';
        }
    }

    /**
     * リストを更新する
     */
    window.updateTsunamiList = (type, data) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        // SVGに差し替え
        headerImg.src = `assets/banner/tsunami/tsunami_list-${type}.svg`;
        body.innerHTML = '';
        
        data.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'list-item-wrapper';
            
            // SVGに差し替え
            const imgSrc = `assets/banner/tsunami/tsunami_list-${item.height}.svg`;
            
            wrapper.innerHTML = `
                <img src="${imgSrc}" alt="${item.height}">
                <div class="overlay area-name-overlay">
                    <span class="text-node area-text">${item.area}</span>
                </div>
                <div class="overlay arrival-time-overlay">
                    <span class="text-node time-text">${item.time}</span>
                </div>
            `;
            body.appendChild(wrapper);

            // 長体処理
            const areaSpan = wrapper.querySelector('.area-text');
            const timeSpan = wrapper.querySelector('.time-text');
            
            adjustTextScale(areaSpan, 360); // 地名枠
            adjustTextScale(timeSpan, 230); // 時刻枠
        });
    };

    // --- テスト実行 ---
    window.addEventListener('load', () => {
        const testData = [
            { area: '北海道太平洋沿岸東部', time: 'すぐ来る', height: '10mu' },
            { area: '北海道太平洋沿岸中部', time: '2日 22:22', height: '10m' },
            { area: '青森県太平洋沿岸', time: '2日 22:40', height: '5m' },
            { area: '鹿児島県奄美群島・トカラ列島', time: '2日 23:10', height: 'kyodai' },
            { area: '相模湾・三浦半島', time: '2日 23:30', height: '3m' }
        ];
        
        updateTsunamiList('ot', testData);
    });
</script>

</body>
</html>
