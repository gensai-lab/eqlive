<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoDB';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'UDKakugoDB', sans-serif;
            font-weight: 400;
        }

        .tsunami-list-container {
            width: 800px;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .list-item-wrapper {
            position: relative;
            width: 800px;
            line-height: 0;
            margin: 0;
            padding: 0;
        }

        .list-item-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            line-height: normal;
            color: #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 津波予報区名エリア */
        .area-name-overlay {
            left: 0;
            width: 400px;
            padding-left: 20px;
            font-size: 38px;
            overflow: hidden;
        }

        /* 到達予想時刻エリア */
        .arrival-time-overlay {
            left: 400px;
            width: 250px;
            justify-content: center;
            font-size: 40px;
            letter-spacing: 1px;
        }

        .text-node {
            display: inline-block;
            transform-origin: left center;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <div class="list-item-wrapper">
        <img id="headerImg" src="assets/banner/tsunami/tsunami-list_ot.svg" alt="Header">
    </div>
    <div id="listBody"></div>
</div>

<script>
    function adjustTextScale(element, maxWidth) {
        const currentWidth = element.offsetWidth;
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        } else {
            element.style.transform = 'scaleX(1)';
        }
    }

    /**
     * @param {string} type - 'ot', 'kt', 'ct'
     * @param {Array} data - { area: string, time: string, height: string }
     */
    window.updateTsunamiList = (type, data) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        headerImg.src = `assets/banner/tsunami/tsunami-list_${type}.svg`;
        body.innerHTML = '';
        
        data.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'list-item-wrapper';
            
            // ファイル名規則の適用
            let hFile = 'none';
            const h = item.height;

            if (h === '10m超') hFile = '10mu';
            else if (h === '10m') hFile = '10m';
            else if (h === '5m') hFile = '5m';
            else if (h === '3m') hFile = '3m';
            else if (h === '1m') hFile = '1m';
            else if (h === '巨大') hFile = 'kyodai';
            else if (h === '高い') hFile = 'takai';
            else if (h === '不明' || h === '') hFile = 'none'; // 数値が特定できない注意報用
            
            const imgSrc = `assets/banner/tsunami/tsunami-list_${hFile}.svg`;
            
            wrapper.innerHTML = `
                <img src="${imgSrc}" alt="${hFile}">
                <div class="overlay area-name-overlay">
                    <span class="text-node area-text">${item.area}</span>
                </div>
                <div class="overlay arrival-time-overlay">
                    <span class="text-node time-text">${item.time}</span>
                </div>
            `;
            body.appendChild(wrapper);

            adjustTextScale(wrapper.querySelector('.area-text'), 360);
            adjustTextScale(wrapper.querySelector('.time-text'), 230);
        });
    };

    // テスト実行：M8以上の巨大地震想定の表示
    window.addEventListener('load', () => {
        const testData = [
            { area: '北海道太平洋沿岸東部', time: 'すぐ来る', height: '巨大' },
            { area: '岩手県', time: 'すぐ来る', height: '巨大' },
            { area: '千葉県九十九里・外房', time: '2日 22:40', height: '高い' },
            { area: '伊豆諸島', time: '2日 22:50', height: '高い' },
            { area: '静岡県', time: '2日 23:10', height: '不明' } // 注意報の「不明」想定
        ];
        
        updateTsunamiList('ot', testData);
    });
</script>

</body>
</html>
