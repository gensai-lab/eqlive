<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
            color: #000;
        }

        .tsunami-list-container {
            width: 800px;
            background-color: #fff;
            margin: 0;
            padding: 0;
        }

        .list-header {
            width: 800px;
            line-height: 0;
        }

        .list-header img {
            width: 100%;
            display: block;
        }

        .list-row {
            display: grid;
            grid-template-columns: 400px 250px 150px;
            border-bottom: 2px solid #ccc;
            align-items: stretch;
            height: 80px;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .area-name-container {
            width: 400px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .area-name {
            font-size: 36px;
            font-weight: bold;
            white-space: nowrap;
            display: inline-block;
            transform-origin: left center;
        }

        /* 到達予想時刻 */
        .arrival-time {
            width: 250px;
            background-color: #FEDC00;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 高さエリア：背景画像の上に文字を重ねる */
        .tsunami-height {
            width: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff; /* 白抜き文字 */
            font-size: 45px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* 視認性向上のための軽い影 */
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <div class="list-header">
        <img id="headerImg" src="assets/banner/tsunami/tsunami_list-kt.png" alt="Header">
    </div>
    <div id="listBody"></div>
</div>

<script>
    function adjustTextScale(element, maxWidth) {
        const currentWidth = element.offsetWidth;
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        } else {
            element.style.transform = 'scaleX(1)';
        }
    }

    window.updateTsunamiList = (type, areas) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        headerImg.src = `assets/banner/tsunami/tsunami_list-${type}.png`;
        body.innerHTML = '';

        areas.forEach(area => {
            let heightImg = 'assets/banner/tsunami/tsunami_list-none.png';
            const h = area.height;

            // 背景画像の選択
            if (h === '10m超') heightImg = 'assets/banner/tsunami/tsunami_list-10mu.png';
            else if (h === '10m') heightImg = 'assets/banner/tsunami/tsunami_list-10m.png';
            else if (h === '5m') heightImg = 'assets/banner/tsunami/tsunami_list-5m.png';
            else if (h === '巨大') heightImg = 'assets/banner/tsunami/tsunami_list-kyodai.png';
            else if (h === '3m') heightImg = 'assets/banner/tsunami/tsunami_list-3m.png';
            else if (h === '高い') heightImg = 'assets/banner/tsunami/tsunami_list-takai.png';
            else if (h === '1m') heightImg = 'assets/banner/tsunami/tsunami_list-1m.png';

            const row = document.createElement('div');
            row.className = 'list-row';
            // 高さ部分はテキスト(area.height)を表示しつつ背景(heightImg)を設定
            row.innerHTML = `
                <div class="area-name-container">
                    <span class="area-name">${area.name}</span>
                </div>
                <div class="arrival-time">${area.time}</div>
                <div class="tsunami-height" style="background-image: url('${heightImg}')">
                    ${h}
                </div>
            `;
            body.appendChild(row);

            const nameSpan = row.querySelector('.area-name');
            adjustTextScale(nameSpan, 370);
        });
    };

    // テスト実行
    window.addEventListener('load', () => {
        const testAreas = [
            { name: '北海道太平洋沿岸東部', time: 'すぐ来る', height: '10m超' },
            { name: '北海道太平洋沿岸中部', time: '2日 22:22', height: '10m' },
            { name: '青森県太平洋沿岸', time: '2日 22:40', height: '5m' },
            { name: '岩手県', time: '2日 22:50', height: '巨大' },
            { name: '鹿児島県奄美群島・トカラ列島', time: '2日 23:10', height: '3m' }
        ];
        updateTsunamiList('ot', testAreas);
    });
</script>

</body>
</html>
