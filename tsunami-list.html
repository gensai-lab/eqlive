<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
            color: #000;
        }

        /* リスト全体のコンテナ：影と余白を完全に除去 */
        .tsunami-list-container {
            width: 800px;
            background-color: #fff;
            margin: 0;
            padding: 0;
            border: none;
        }

        /* ヘッダー画像：隙間なく配置 */
        .list-header {
            width: 100%;
            line-height: 0; /* 下部の微細な隙間を排除 */
        }

        .list-header img {
            width: 100%;
            display: block;
        }

        /* 各行のレイアウト：余白ゼロ */
        .list-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.8fr;
            border-bottom: 2px solid #ccc;
            align-items: stretch; /* 高さをいっぱいに使う */
            height: 80px;
            margin: 0;
            padding: 0;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        /* 予報区名：垂直中央揃え */
        .area-name {
            padding: 0 15px;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
        }

        /* 到達予想時刻：背景を上下左右いっぱいに広げる */
        .arrival-time {
            background-color: #FEDC00;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0; /* マージンを排除 */
        }

        /* 高さ画像：コンテナいっぱいに表示 */
        .tsunami-height {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            margin: 0;
            padding: 0;
            line-height: 0;
        }

        .tsunami-height img {
            height: 100%;
            width: 100%;
            display: block;
            object-fit: cover; /* 画像をセルいっぱいにフィットさせる */
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <!-- ヘッダー画像 -->
    <div class="list-header">
        <img id="headerImg" src="assets/banner/tsunami/tsunami_list-kt.png" alt="Header">
    </div>

    <!-- リストボディ -->
    <div id="listBody">
        <!-- JavaScriptで生成 -->
    </div>
</div>

<script>
    /**
     * リストを更新する
     * @param {string} type - 'ot', 'kt', 'ct'
     * @param {Array} areas - 予報区データの配列
     */
    window.updateTsunamiList = (type, areas) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        // ヘッダー画像の切り替え
        headerImg.src = `assets/banner/tsunami/tsunami_list-${type}.png`;

        // リストの生成
        body.innerHTML = '';
        areas.forEach(area => {
            let heightImgSrc = 'assets/banner/tsunami/tsunami_list-none.png';
            const h = area.height;

            if (h === '10m超') heightImgSrc = 'assets/banner/tsunami/tsunami_list-10mu.png';
            else if (h === '10m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-10m.png';
            else if (h === '5m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-5m.png';
            else if (h === '巨大') heightImgSrc = 'assets/banner/tsunami/tsunami_list-kyodai.png';
            else if (h === '3m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-3m.png';
            else if (h === '高い') heightImgSrc = 'assets/banner/tsunami/tsunami_list-takai.png';
            else if (h === '1m') heightImgSrc = 'assets/banner/tsunami/tsunami_list-1m.png';

            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div class="area-name">${area.name}</div>
                <div class="arrival-time">${area.time}</div>
                <div class="tsunami-height">
                    <img src="${heightImgSrc}" alt="${h}">
                </div>
            `;
            body.appendChild(row);
        });
    };

    // テスト表示用
    /*
    updateTsunamiList('kt', [
        { name: '北海道太平洋沿岸中部', time: '22日 22:22', height: '3m' },
        { name: '青森県太平洋沿岸', time: '22日 22:30', height: '3m' },
        { name: '岩手県', time: '22日 22:40', height: '3m' }
    ]);
    */
</script>

</body>
</html>
