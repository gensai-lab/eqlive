<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoDB';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'UDKakugoDB', sans-serif;
            font-weight: 400;
            /* 文字のプロポーショナル詰めを有効化 */
            font-feature-settings: "palt";
        }

        .tsunami-list-container {
            width: 800px;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .list-item-wrapper {
            position: relative;
            width: 800px;
            line-height: 0;
            margin: 0;
            padding: 0;
        }

        .list-item-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            line-height: normal;
            color: #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 津波予報区名エリア */
        .area-name-overlay {
            left: 0;
            width: 400px;
            padding-left: 20px;
            font-size: 38px;
            overflow: hidden;
        }

        .area-text {
            display: inline-block;
            transform-origin: left center;
        }

        /* 到達予想時刻エリア */
        .arrival-time-overlay {
            left: 400px;
            width: 250px;
            justify-content: center;
            font-size: 40px;
            letter-spacing: 1px;
        }

        .time-text {
            display: inline-block;
            transform-origin: center center;
        }
    </style>
</head>
<body>

<div class="tsunami-list-container" id="tsunamiList">
    <div class="list-item-wrapper">
        <img id="headerImg" src="assets/banner/tsunami/tsunami-list_ot.svg" alt="Header">
    </div>
    <div id="listBody"></div>
</div>

<script>
    /**
     * 津波文言変換辞書
     */
    const timeTextDictionary = {
        'ただちに津波来襲と予測': 'すぐ来る',
        '第１波の到達を確認': '第1波到達',
        '津波到達中と推測': '到達中'
    };

    /**
     * 文言を変換する関数
     */
    function formatTimeText(text) {
        // 辞書に一致するものがあれば変換、なければそのまま返す
        return timeTextDictionary[text] || text;
    }

    /**
     * 文字の長体（圧縮）処理
     */
    function adjustTextScale(element, maxWidth) {
        element.style.transform = 'scaleX(1)';
        const currentWidth = element.offsetWidth;
        
        if (currentWidth > maxWidth) {
            const scale = maxWidth / currentWidth;
            element.style.transform = `scaleX(${scale})`;
        }
    }

    /**
     * リスト更新
     */
    window.updateTsunamiList = (type, data) => {
        const headerImg = document.getElementById('headerImg');
        const body = document.getElementById('listBody');

        headerImg.src = `assets/banner/tsunami/tsunami-list_${type}.svg`;
        body.innerHTML = '';
        
        data.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'list-item-wrapper';
            
            let hFile = 'none';
            const h = item.height;

            if (h === '10m超') hFile = '10mu';
            else if (h === '10m') hFile = '10m';
            else if (h === '5m') hFile = '5m';
            else if (h === '3m') hFile = '3m';
            else if (h === '1m') hFile = '1m';
            else if (h === '巨大') hFile = 'kyodai';
            else if (h === '高い') hFile = 'takai';
            else if (h === '不明' || h === '') hFile = 'none';
            
            const imgSrc = `assets/banner/tsunami/tsunami-list_${hFile}.svg`;
            
            // 時刻テキストを辞書を通して変換
            const displayTime = formatTimeText(item.time);
            
            wrapper.innerHTML = `
                <img src="${imgSrc}" alt="${hFile}">
                <div class="overlay area-name-overlay">
                    <span class="area-text">${item.area}</span>
                </div>
                <div class="overlay arrival-time-overlay">
                    <span class="time-text">${displayTime}</span>
                </div>
            `;
            body.appendChild(wrapper);

            adjustTextScale(wrapper.querySelector('.area-text'), 360);
            adjustTextScale(wrapper.querySelector('.time-text'), 230);
        });
    };

    // テスト実行
    window.addEventListener('load', () => {
        const testData = [
            { area: '北海道太平洋沿岸東部', time: 'ただちに津波来襲と予測', height: '巨大' },
            { area: '岩手県', time: '第１波の到達を確認', height: '巨大' },
            { area: '宮城県', time: '津波到達中と推測', height: '巨大' },
            { area: '福島県', time: '2日 22:40', height: '高い' }
        ];
        
        updateTsunamiList('ot', testData);
    });
</script>

</body>
</html>
