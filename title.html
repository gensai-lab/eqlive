<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* フォント定義 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --warning-red: #DE080A; /* 指定の色に変更 */
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0; /* 画面端に密着させるため0に設定 */
            background-color: #222;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* タイトル全体のコンテナ */
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* 影（filter: drop-shadow）を削除 */
            margin-top: 100px; /* 上方向の余白（表示位置調整用） */
        }

        /* サブボックス（白） */
        .subtitle-box {
            background-color: var(--text-white);
            color: var(--warning-red); /* 文字色を #DE080A に変更 */
            font-size: 48px;
            font-weight: bold;
            padding: 4px 25px;
            border-radius: 8px 8px 0px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            margin-bottom: 0;
        }

        /* メインボックス（赤） */
        .main-title-box {
            background-color: var(--warning-red); /* 背景色を #DE080A に変更 */
            color: var(--text-white);
            font-size: 96px;
            font-weight: bold;
            padding: 12px 45px;
            border-radius: 0px 8px 8px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            line-height: 1.1;
            position: relative;
        }

        /* 左側の白いライン装飾 */
        .main-title-box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            background-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="title-container">
        <!-- サブボックス -->
        <div class="subtitle-box" id="displaySubtitle">
            青森で震度5強
        </div>
        <!-- メインボックス -->
        <div class="main-title-box" id="displayMainTitle">
            北海道・青森・岩手に津波警報
        </div>
    </div>

</body>
</html>
