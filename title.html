<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* フォント定義 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 600;
        }
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --warning-red: #DE080A;
            --text-white: #ffffff;
            --main-text-indent: 53px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0;
            padding-bottom: 5px;
        }

        .subtitle-box {
            background-color: var(--text-white);
            color: var(--warning-red);
            font-size: 52px; 
            font-weight: 400;
            padding: 5px 25px 5px 25px;
            border-radius: 8px 8px 0px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            margin-bottom: 0;
            margin-left: var(--main-text-indent);
            line-height: 1.1;
            /* 初期状態では非表示（データが来たら表示） */
            display: none; 
        }

        .main-title-box {
            background-color: var(--warning-red);
            color: var(--text-white);
            font-size: 96px;
            font-weight: 400;
            padding: 12px 30px 12px 60px;
            border-radius: 0px 8px 8px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            line-height: 1.1;
            position: relative;
            /* 初期状態では非表示 */
            display: none;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="subtitle-box" id="displaySubtitle"></div>
        <div class="main-title-box" id="displayMainTitle"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Firebaseのデータを監視してリアルタイム更新
        const titleRef = ref(db, 'broadcast/current');
        onValue(titleRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const subEl = document.getElementById('displaySubtitle');
                const mainEl = document.getElementById('displayMainTitle');

                // サブテキストの更新
                if (data.subtitle) {
                    subEl.innerText = data.subtitle;
                    subEl.style.display = 'block';
                } else {
                    subEl.style.display = 'none';
                }

                // メインタイトルの更新
                if (data.mainTitle) {
                    mainEl.innerText = data.mainTitle;
                    mainEl.style.display = 'block';
                } else {
                    mainEl.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
