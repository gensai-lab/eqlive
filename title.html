<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* フォント定義 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: 400;
        }

        :root {
            --warning-red: #DE080A;
            --text-white: #ffffff;
            --main-text-indent: 53px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'UDKakugoLarge', sans-serif;
            overflow: hidden;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0;
            padding-bottom: 5px;
        }

        /* サブボックス: サイズを52pxに拡大 */
        .subtitle-box {
            background-color: var(--text-white);
            color: var(--warning-red);
            font-size: 52px; 
            font-weight: 600;
            padding: 8px 25px 8px 25px; /* 下側に少し余裕を持たせる */
            border-radius: 8px 8px 0px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            margin-bottom: 0;
            margin-left: var(--main-text-indent);
            line-height: 1.1;
        }

        .main-title-box {
            background-color: var(--warning-red);
            color: var(--text-white);
            font-size: 96px;
            font-weight: 400;
            padding: 15px 50px;
            border-radius: 0px 8px 8px 0px; 
            white-space: nowrap;
            font-feature-settings: "palt";
            line-height: 1.1;
            position: relative;
        }

        .main-title-box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            background-color: rgba(255, 255, 255, 0);
        }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="subtitle-box" id="displaySubtitle">青森で震度5強</div>
        <div class="main-title-box" id="displayMainTitle">北海道・青森・岩手に津波警報</div>
    </div>
</body>
</html>
