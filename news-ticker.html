<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        #waiting-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./assets/banner/ticker-t.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            display: block;
        }

        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px; /* 文字数によって調整できるよう少し小さめに設定 */
            line-height: 1.2;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column; /* 2行にするため縦並び */
            justify-content: center;
            padding: 0 15px;
            background-color: white;
        }

        .news-line {
            font-size: 36px; /* スクロールなし・2行のためサイズ調整 */
            color: #1a1a1a;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .line-1 { border-bottom: 1px solid #eee; padding-bottom: 2px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="waiting-banner"></div>
    <div id="genre-text" class="genre-label"></div>
    <div class="content-area" id="main-content" style="visibility: hidden;">
        <div id="text-line1" class="news-line line-1"></div>
        <div id="text-line2" class="news-line"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const genreElement = document.getElementById('genre-text');
    const line1Element = document.getElementById('text-line1');
    const line2Element = document.getElementById('text-line2');
    const contentArea = document.getElementById('main-content');
    const waitingBanner = document.getElementById('waiting-banner');

    onValue(ref(db, 'broadcast/manual_news'), (snapshot) => {
        const data = snapshot.val();

        if (data && (data.line1 || data.line2)) {
            waitingBanner.style.display = "none";
            contentArea.style.visibility = "visible";
            genreElement.style.visibility = "visible";

            // ジャンルの処理（2文字ずつ改行を入れる処理など）
            let genreDisp = data.genre || "情報";
            if (genreDisp.length > 2) {
                genreDisp = genreDisp.substring(0, 2) + "<br>" + genreDisp.substring(2, 4);
            } else {
                genreDisp = genreDisp.split('').join('<br>');
            }
            genreElement.innerHTML = genreDisp;

            line1Element.innerText = data.line1 || "";
            line2Element.innerText = data.line2 || "";
        } else {
            waitingBanner.style.display = "block";
            contentArea.style.visibility = "hidden";
            genreElement.style.visibility = "hidden";
        }
    });
</script>

</body>
</html>
