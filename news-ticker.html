<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* 外枠の角丸コンテナ */
        .main-container {
            width: 580px; /* 余白を持たせる */
            height: 115px;
            margin: 10px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* 左側のジャンル表示（青い部分） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            line-height: 1.2;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 右側のコンテンツエリア */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15px;
            overflow: hidden;
        }

        /* ニュースのソース名（上段） */
        .source-name {
            font-size: 20px;
            color: #444;
            margin-bottom: 2px;
        }

        /* ニュース本文（下段・スクロール） */
        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 50px;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 36px;
            color: #1a1a1a;
            font-weight: bold;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="genre-label">
        新<br>聞
    </div>
    <div class="content-area">
        <div class="source-name" id="source-display">読売新聞 最新ニュース</div>
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content">
                ニュースを読み込んでいます...
            </div>
        </div>
    </div>
</div>

<script>
    // GASのURLを貼り付けてください
    const GAS_API_URL = 'ここにGASのURLを貼り付け';

    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let tickerMessage = "";

            items.forEach((item, i) => {
                if (i < 10) { 
                    let title = item.querySelector("title").textContent;
                    
                    // 【要約処理】30文字を超える場合はカットして「...」を付与
                    if (title.length > 30) {
                        title = title.substring(0, 30) + "...";
                    }
                    
                    tickerMessage += `　　■ ${title}`;
                }
            });

            if (tickerMessage) {
                const displayArea = document.getElementById('ticker-text');
                displayArea.innerText = tickerMessage + "　　"; // 末尾に余白
                
                // テキストの長さに応じてスクロール時間を調整（1文字0.3秒）
                const duration = Math.max(20, (tickerMessage.length * 0.3));
                displayArea.style.animationDuration = `${duration}s`;
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            document.getElementById('ticker-text').innerText = "ニュースを取得できませんでした。";
        }
    }

    fetchRSS();
    setInterval(fetchRSS, 600000);
</script>

</body>
</html>
