<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 135px;
        }

        .header {
            background-color: #003EB3;
            color: white;
            font-size: 24px;
            padding: 5px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticker-viewport {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            background: white;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 38px;
            color: #333;
            font-weight: bold;
            padding-left: 100%;
            animation: ticker-scroll 25s linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .timestamp {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>最新の防災情報</span>
        <span class="timestamp" id="update-time">取得中...</span>
    </div>
    <div class="ticker-viewport">
        <div id="ticker-text" class="ticker-content">
            情報を取得しています...
        </div>
    </div>
</div>

<script>
    // 先ほどコピーしたGASのウェブアプリURLをここに貼り付けてください
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxf0mTQlCZUlug2IG8eBpIwB_RLkdt-xqNUB-3YJ9tWnqVyi6hcYdQGlKYQSuCbBV_U/exec';

    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);

            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            
            // 気象庁RSSの構造に合わせて解析（entryタグ）
            const entries = xml.querySelectorAll("entry");
            let tickerMessage = "";

            entries.forEach((entry, index) => {
                if (index < 8) { 
                    const title = entry.querySelector("title").textContent;
                    tickerMessage += `　■ ${title}　`;
                }
            });

            if (tickerMessage) {
                // 文字数に応じてスクロール速度を自動調整
                const displayArea = document.getElementById('ticker-text');
                displayArea.innerText = tickerMessage + tickerMessage; 
                
                const duration = Math.max(20, (tickerMessage.length * 0.5));
                displayArea.style.animationDuration = `${duration}s`;

                const now = new Date();
                document.getElementById('update-time').innerText = 
                    `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')} 更新`;
            }
        } catch (error) {
            console.error('取得失敗:', error);
            document.getElementById('ticker-text').innerText = "情報の更新を待機しています...";
        }
    }

    fetchRSS();
    setInterval(fetchRSS, 300000); // 5分おき
</script>

</body>
</html>
