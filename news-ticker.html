<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 待機用バナー */
        #waiting-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./assets/banner/ticker-t.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            display: block;
        }

        /* ジャンル表示（46px） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 80px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px; 
            line-height: 1.1;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            padding: 0 5px;
            box-sizing: border-box;
            visibility: hidden;
        }

        /* ニュース内容表示エリア（中央揃え設定） */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直方向中央 */
            align-items: center;     /* 水平方向中央 */
            padding: 0 15px;
            background-color: white;
            visibility: hidden;
            text-align: center;      /* テキスト自体も中央揃え */
        }

        /* ニュース内容（40px / 行間1.3） */
        .news-line {
            width: 100%;
            font-size: 43px; 
            color: #1a1a1a;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .line-1 { 
            border-bottom: none; 
            margin-bottom: 0; 
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="waiting-banner"></div>
    <div id="genre-text" class="genre-label"></div>
    <div class="content-area" id="main-content">
        <div id="text-line1" class="news-line line-1"></div>
        <div id="text-line2" class="news-line"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const genreElement = document.getElementById('genre-text');
    const line1Element = document.getElementById('text-line1');
    const line2Element = document.getElementById('text-line2');
    const contentArea = document.getElementById('main-content');
    const waitingBanner = document.getElementById('waiting-banner');

    onValue(ref(db, 'broadcast/manual_news'), (snapshot) => {
        const data = snapshot.val();

        if (data && (data.line1 || data.line2)) {
            waitingBanner.style.display = "none";
            contentArea.style.visibility = "visible";
            genreElement.style.visibility = "visible";

            let genreRaw = data.genre || "情報";
            let genreDisp = "";
            if (genreRaw.length > 2) {
                genreDisp = genreRaw.substring(0, 2) + "<br>" + genreRaw.substring(2, 4);
            } else {
                genreDisp = genreRaw.split('').join('<br>');
            }
            genreElement.innerHTML = genreDisp;

            line1Element.innerText = data.line1 || "";
            line2Element.innerText = data.line2 || "";
        } else {
            waitingBanner.style.display = "block";
            contentArea.style.visibility = "hidden";
            genreElement.style.visibility = "hidden";
        }
    });

    onValue(ref(db, 'broadcast/current'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.statusType === 'ningen') {
            genreElement.style.backgroundColor = "#d32f2f";
        } else {
            genreElement.style.backgroundColor = "#003EB3";
        }
    });
</script>

</body>
</html>
