<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            border: none;
        }

        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            line-height: 1.1;
            letter-spacing: 2px;
        }

        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: white;
        }

        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 48px;
            color: #1a1a1a;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="genre-text" class="genre-label">新<br>聞</div>
    <div class="content-area">
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content">情報を取得中...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxWRgwizVqOW8vEKGKYoTOYkuMEETgzONsr4nqveX3Y6kCKILlD9Fee4_NzkLlXMn4g/exec';

    // RSS（GAS）からデータを取得する関数
    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            let msg = "";
            items.forEach((item, i) => {
                if (i < 10) {
                    let title = item.querySelector("title").textContent;
                    if (title.length > 30) title = title.substring(0, 30) + "...";
                    msg += `　　■ ${title}`;
                }
            });
            return msg;
        } catch (e) {
            return "";
        }
    }

    // 表示を更新するメインロジック
    const tickerElement = document.getElementById('ticker-text');
    const genreElement = document.getElementById('genre-text');

    onValue(ref(db, 'broadcast/manual_news'), async (snapshot) => {
        const data = snapshot.val();
        let finalMessage = "";

        if (data && data.items && data.items.length > 0) {
            // 【手動ニュースがある場合】
            genreElement.innerHTML = "速<br>報";
            data.items.forEach(text => {
                finalMessage += `　　■ ${text}`;
            });
        } else {
            // 【手動ニュースがない場合】RSSを取得
            genreElement.innerHTML = "新<br>聞";
            finalMessage = await fetchRSS();
        }

        if (finalMessage) {
            tickerElement.innerText = finalMessage + finalMessage;
            const duration = Math.max(20, (finalMessage.length * 0.25));
            tickerElement.style.animationDuration = `${duration}s`;
        } else {
            tickerElement.innerText = "現在、新しい情報はありません。";
        }
    });
</script>

</body>
</html>
