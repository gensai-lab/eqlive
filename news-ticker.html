<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            /* DB（デミボールド）相当のウェイトを指定 */
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            border: none;
        }

        /* 左側のジャンル表示（青い部分） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            line-height: 1.1;
            letter-spacing: 2px;
        }

        /* 右側のコンテンツエリア：1段構成で中央に配置 */
        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: white;
        }

        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 80px; /* 1段なので高さを確保 */
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 48px; /* 1段で見やすいためサイズを拡大 */
            color: #1a1a1a;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="genre-label">
        新<br>聞
    </div>
    <div class="content-area">
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content">
                ニュースを読み込んでいます...
            </div>
        </div>
    </div>
</div>

<script>
    // 指定されたGASのURL
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxWRgwizVqOW8vEKGKYoTOYkuMEETgzONsr4nqveX3Y6kCKILlD9Fee4_NzkLlXMn4g/exec';

    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let tickerMessage = "";

            items.forEach((item, i) => {
                if (i < 10) { 
                    let title = item.querySelector("title").textContent;
                    
                    // 30文字以上はカットして要約
                    if (title.length > 30) {
                        title = title.substring(0, 30) + "...";
                    }
                    
                    tickerMessage += `　　■ ${title}`;
                }
            });

            if (tickerMessage) {
                const displayArea = document.getElementById('ticker-text');
                // ループ用に2回繰り返す
                displayArea.innerText = tickerMessage + tickerMessage; 
                
                // スクロール速度調整
                const duration = Math.max(20, (tickerMessage.length * 0.25));
                displayArea.style.animationDuration = `${duration}s`;
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            document.getElementById('ticker-text').innerText = "情報の更新を待機しています...";
        }
    }

    fetchRSS();
    // 10分おきに更新
    setInterval(fetchRSS, 600000);
</script>

</body>
</html>
