<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 135px;
        }

        .header {
            background-color: #003EB3;
            color: white;
            font-size: 24px;
            padding: 5px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticker-viewport {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            background: white;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 38px;
            color: #333;
            font-weight: bold;
            padding-left: 100%;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .timestamp {
            font-size: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>最新ニュース by 読売新聞</span>
        <span class="timestamp" id="update-time">取得中...</span>
    </div>
    <div class="ticker-viewport">
        <div id="ticker-text" class="ticker-content">
            ニュースを読み込んでいます...
        </div>
    </div>
</div>

<script>
    // デプロイしたGASのURLをここに貼り付けてください
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxfv5qH_FGvQCyCEGZJ3q7Z0b2W74PV3yqdWQQvXjqf1h5cbdwrgIGajqtzNC1MqPjk/exec';

    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            
            // 読売新聞RSS (RSS 1.0) の構造に合わせて 'item' タグを取得
            const items = xml.querySelectorAll("item");
            let tickerMessage = "";

            if (items.length === 0) {
                // 万が一itemが取れない場合、entryタグも試す（互換性のため）
                const entries = xml.querySelectorAll("entry");
                entries.forEach((el, i) => { if(i < 10) tickerMessage += `　■ ${el.querySelector("title").textContent}　`; });
            } else {
                items.forEach((item, i) => {
                    if (i < 10) { 
                        const title = item.querySelector("title").textContent;
                        tickerMessage += `　■ ${title}　`;
                    }
                });
            }

            if (tickerMessage) {
                const displayArea = document.getElementById('ticker-text');
                // 文字列を2回繰り返してループをスムーズにする
                displayArea.innerText = tickerMessage + tickerMessage; 
                
                // スクロール速度の調整 (1文字あたり約0.4秒)
                const duration = Math.max(25, (tickerMessage.length * 0.7));
                displayArea.style.animationDuration = `${duration}s`;

                const now = new Date();
                document.getElementById('update-time').innerText = 
                    `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')} 更新`;
            } else {
                throw new Error('No items found');
            }
        } catch (error) {
            console.error('RSS Fetch Error:', error);
            document.getElementById('ticker-text').innerText = "ニュースの取得に失敗しました。URLやGASの設定を確認してください。";
        }
    }

    fetchRSS();
    // 10分おきに更新
    setInterval(fetchRSS, 600000);
</script>

</body>
</html>
