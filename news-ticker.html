<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* 外枠コンテナ：影を消し、サイズを600x135に固定 */
        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            border: none; /* 影と枠線を排除 */
        }

        /* 左側のジャンル表示（青い部分） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px; /* 少し幅を広げて安定感を出す */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            line-height: 1.1;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 右側のコンテンツエリア */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: white;
        }

        /* ニュースのソース名（上段） */
        .source-name {
            font-size: 22px;
            color: #555;
            margin-bottom: 5px;
            border-bottom: 2px solid #003EB3; /* アクセントの線 */
            width: fit-content;
            padding-right: 10px;
        }

        /* ニュース本文（下段・スクロール） */
        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 60px;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 42px; /* 文字を大きく */
            color: #1a1a1a;
            font-weight: bold;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="genre-label">
        新<br>聞
    </div>
    <div class="content-area">
        <div class="source-name" id="source-display">読売新聞 最新ニュース</div>
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content">
                ニュースを読み込んでいます...
            </div>
        </div>
    </div>
</div>

<script>
    // あなたのGASのURLをここに貼り付けてください
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxWRgwizVqOW8vEKGKYoTOYkuMEETgzONsr4nqveX3Y6kCKILlD9Fee4_NzkLlXMn4g/exec';

    async function fetchRSS() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let tickerMessage = "";

            items.forEach((item, i) => {
                if (i < 10) { 
                    let title = item.querySelector("title").textContent;
                    
                    // 【要約設定】30文字以上はカット
                    if (title.length > 30) {
                        title = title.substring(0, 30) + "...";
                    }
                    
                    tickerMessage += `　　■ ${title}`;
                }
            });

            if (tickerMessage) {
                const displayArea = document.getElementById('ticker-text');
                // ループを滑らかにするために2回繰り返す
                displayArea.innerText = tickerMessage + tickerMessage; 
                
                // スクロール速度（1文字あたり0.25秒程度に設定）
                const duration = Math.max(20, (tickerMessage.length * 0.25));
                displayArea.style.animationDuration = `${duration}s`;
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            document.getElementById('ticker-text').innerText = "ニュースを取得できませんでした。";
        }
    }

    fetchRSS();
    // 10分おきに更新
    setInterval(fetchRSS, 600000);
</script>

</body>
</html>
