<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            border: none;
            position: relative;
        }

        /* 待機用バナー（SVG）の表示エリア */
        #waiting-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./assets/banner/ticker-t.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            display: block; /* 初期状態は表示 */
        }

        /* 通常テロップのパーツ（最初は隠しておく） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            line-height: 1.1;
            letter-spacing: 2px;
            font-weight: bold;
            visibility: hidden; 
        }

        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: white;
            visibility: hidden;
        }

        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 48px;
            color: #1a1a1a;
            font-weight: bold;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- 待機用SVGを表示するレイヤー -->
    <div id="waiting-banner"></div>

    <!-- 通常テロップレイヤー -->
    <div id="genre-text" class="genre-label">情<br>報</div>
    <div class="content-area" id="main-content">
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const tickerElement = document.getElementById('ticker-text');
    const genreElement = document.getElementById('genre-text');
    const contentArea = document.getElementById('main-content');
    const waitingBanner = document.getElementById('waiting-banner');

    // ニュースデータの監視
    onValue(ref(db, 'broadcast/manual_news'), (snapshot) => {
        const data = snapshot.val();
        let finalMessage = "";

        if (data && data.items && data.items.length > 0) {
            // データがある場合：バナーを消し、テロップを表示
            waitingBanner.style.display = "none";
            genreElement.style.visibility = "visible";
            contentArea.style.visibility = "visible";

            data.items.forEach(text => {
                finalMessage += `　　■ ${text}`;
            });
            
            tickerElement.innerText = finalMessage + finalMessage;
            const duration = Math.max(15, (finalMessage.length * 0.25));
            tickerElement.style.animationDuration = `${duration}s`;
            tickerElement.style.animationPlayState = "running";
        } else {
            // データがない場合：バナーを表示し、テロップを隠す
            waitingBanner.style.display = "block";
            genreElement.style.visibility = "hidden";
            contentArea.style.visibility = "hidden";
            tickerElement.innerText = "";
            tickerElement.style.animation = "none";
        }
    });

    // 配信モードによるラベル色・文字の変更
    onValue(ref(db, 'broadcast/current'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.statusType === 'ningen') {
            genreElement.innerHTML = "速<br>報";
            genreElement.style.backgroundColor = "#d32f2f";
        } else {
            genreElement.innerHTML = "情<br>報";
            genreElement.style.backgroundColor = "#003EB3";
        }
    });
</script>

</body>
</html>
