<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            /* DB（デミボールド）ウェイト */
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
            font-weight: 400;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 600px;
            height: 135px;
            font-family: 'UDKakugoLarge', sans-serif;
            font-weight: 400;
        }

        .main-container {
            width: 600px;
            height: 135px;
            background-color: white;
            display: flex;
            overflow: hidden;
            border: none;
        }

        /* 左側のラベル（管理画面のモードに合わせて色や文字を変えることも可能） */
        .genre-label {
            background-color: #003EB3;
            color: white;
            width: 90px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            line-height: 1.1;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: white;
        }

        .ticker-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            position: absolute;
            font-size: 48px;
            color: #1a1a1a;
            font-weight: bold;
            animation: ticker-scroll linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="genre-text" class="genre-label">速<br>報</div>
    <div class="content-area">
        <div class="ticker-viewport">
            <div id="ticker-text" class="ticker-content">情報を待機しています...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const tickerElement = document.getElementById('ticker-text');
    const genreElement = document.getElementById('genre-text');

    // Firebaseの「ニュース管理」データを監視
    onValue(ref(db, 'broadcast/manual_news'), (snapshot) => {
        const data = snapshot.val();
        let finalMessage = "";

        if (data && data.items && data.items.length > 0) {
            // 管理画面から入力された項目を結合
            data.items.forEach(text => {
                finalMessage += `　　■ ${text}`;
            });
            
            // テキストを反映（ループ用に2回繰り返す）
            tickerElement.innerText = finalMessage + finalMessage;
            
            // 文字数に応じてスクロール速度を動的に変更（1文字0.25秒）
            const duration = Math.max(15, (finalMessage.length * 0.25));
            tickerElement.style.animationDuration = `${duration}s`;
        } else {
            // ニュース項目が空の場合の表示
            tickerElement.innerText = "現在、新しい情報はありません。";
            tickerElement.style.animation = "none"; // スクロール停止
        }
    });

    // 配信モード（Bot/人間）によってラベルの色や文字を変えたい場合の拡張用
    onValue(ref(db, 'broadcast/current'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.statusType === 'ningen') {
            genreElement.innerHTML = "速<br>報";
            genreElement.style.backgroundColor = "#d32f2f"; // 人間配信時は赤色にする例
        } else {
            genreElement.innerHTML = "情<br>報";
            genreElement.style.backgroundColor = "#003EB3"; // 通常（Bot）は青色
        }
    });
</script>

</body>
</html>
