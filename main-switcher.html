<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kactuif - Main Switcher</title>
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --clock-stroke: #003EB3;
            --text-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: black;
            font-family: 'UDKakugoLarge', sans-serif;
            position: relative;
        }

        /* ――― レイヤー構造 ――― */

        /* 1. ベース層（映像・背景） */
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* 2. 情報追加層 */
        .info-overlay-frame {
            position: absolute;
            border: none;
            z-index: 10;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        /* タイトル枠: 横幅100% / 高さ210px / 背景透過 */
        #titleFrame {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 210px;
            background: transparent;
        }

        /* 津波マップ枠: 600x350 / 背景黒(0.9) / 角丸8px */
        #tsunamiFrame {
            bottom: 230px; /* タイトル枠の上に配置 */
            right: 40px;
            width: 600px;
            height: 350px;
            background-color: rgba(0, 0, 0, 0.9);
            border-radius: 8px;
        }

        /* 津波呼びかけ枠: 600x146 / 背景透過 / 角丸8px */
        #infoTopFrame {
            top: 40px;
            right: 40px;
            width: 600px;
            height: 146px;
            background-color: transparent;
            border-radius: 8px;
        }

        /* 3. 最前面固定層（時計・ロゴ） */
        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .video-overlay-elements {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .clock {
            font-size: 90px;
            font-weight: bold;
            color: var(--text-white);
            -webkit-text-stroke: 12px var(--clock-stroke);
            stroke-linejoin: round;
            paint-order: stroke fill;
            line-height: 1;
            font-feature-settings: "palt";
        }

        .distributor-banner img {
            height: 70px;
        }
    </style>
</head>
<body>

    <!-- 1. ベースレイヤー -->
    <iframe id="content-layer" src="tsunami-info-overlay.html"></iframe>

    <!-- 2. 追加情報レイヤー -->
    <iframe id="titleFrame" class="info-overlay-frame" src="title.html" style="opacity: 0;"></iframe>
    <iframe id="tsunamiFrame" class="info-overlay-frame" src="tsunami-map.html" style="opacity: 0;"></iframe>
    <iframe id="infoTopFrame" class="info-overlay-frame" src="tsunami-yobikake.html" style="opacity: 0;"></iframe>

    <!-- 3. 固定オーバーレイ -->
    <div class="static-overlay">
        <div class="video-overlay-elements">
            <div class="clock" id="liveClock">00：00</div>
            <div class="distributor-banner">
                <img id="distributorImg" src="assets/banner/distributor/bot.png">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${h}：${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        onValue(ref(db, 'broadcast/current'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const bannerImg = document.getElementById('distributorImg');
            bannerImg.src = data.statusType === 'ningen' 
                ? 'assets/banner/distributor/ningen.png' 
                : 'assets/banner/distributor/bot.png';

            const titleFrame = document.getElementById('titleFrame');
            const tsunamiFrame = document.getElementById('tsunamiFrame');
            const infoTopFrame = document.getElementById('infoTopFrame');

            if (data.layoutMode === 'tsunami') {
                titleFrame.style.opacity = "1";
                tsunamiFrame.style.opacity = "1";
                infoTopFrame.style.opacity = "1";
            } else {
                titleFrame.style.opacity = "0";
                tsunamiFrame.style.opacity = "0";
                infoTopFrame.style.opacity = "0";
            }
        });
    </script>
</body>
</html>
