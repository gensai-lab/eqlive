<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kactuif - Tsunami Info Overlay</title>
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            background: url('assets/cover/cover.jpg') no-repeat center center;
            background-size: cover;
            font-family: 'UDKakugoLarge', sans-serif;
            color: var(--text-white);
            display: grid;
            grid-template-columns: 1280px 640px;
            grid-template-rows: 1fr; 
        }

        .main-content {
            grid-column: 1;
            grid-row: 1;
            padding: 155px 0 0 40px;
            position: relative;
        }

        /* 映像を表示するコンテナ */
        .video-container {
            width: 1215px;
            height: 675px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-radius: 8px; 
        }

        /* iframeをコンテナいっぱいに広げる */
        #mainVideoIframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .tsunami-panel {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 0 40px 40px 0;
            gap: 20px;
        }

        .info-top-frame {
            width: 600px;
            height: 146px;
            border: none;
            background-color: transparent;
            border-radius: 8px;
            opacity: 0;
        }

        .info-mid-frame {
            width: 600px;
            height: 135px;
            border: none;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
        }

        .tsunami-list-frame {
            width: 600px;
            height: 310px;
            border: none;
            background-color: #fff;
            border-radius: 8px;
        }

        .tsunami-frame {
            width: 600px;
            height: 350px;
            border: none;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 8px; 
            opacity: 0;
        }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="video-container">
            <!-- ① live-only.html を埋め込む iframe -->
            <iframe id="mainVideoIframe" src="live-only.html" scrolling="no" allow="autoplay; encrypted-media"></iframe>
        </div>
    </main>

    <aside class="tsunami-panel">
        <iframe id="infoTopIframe" src="about:blank" class="info-top-frame" scrolling="no" allowtransparency="true"></iframe>
        <iframe id="infoMidIframe" src="news-ticker.html" class="info-mid-frame" scrolling="no" allowtransparency="true"></iframe>
        <iframe id="tsunamiListIframe" src="tsunami-list.html" class="tsunami-list-frame" scrolling="no" allowtransparency="true"></iframe>
        <iframe id="tsunamiMapIframe" src="about:blank" class="tsunami-frame" scrolling="no" allowtransparency="true"></iframe>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'tsunami'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const dataArray = Object.values(data).flat();
            const listIframe = document.getElementById('tsunamiListIframe').contentWindow;
            if (listIframe.updateTsunamiList) {
                listIframe.updateTsunamiList(dataArray);
            }
        });

        // Firebaseから映像URL（m3u8）を受け取り、子画面（live-only.html）に伝える
        onValue(ref(db, 'broadcast/current'), (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.videoUrl) return;

            const iframe = document.getElementById('mainVideoIframe');
            
            // live-only.html内の再生関数を呼び出す
            // まだ読み込まれていない場合を考慮し、URLをクエリパラメータで渡すか、
            // postMessageで通信する形が確実です。
            if (iframe.contentWindow && data.videoUrl) {
                // live-only.html 側にURLを送信（※live-only.html側で受信処理が必要）
                iframe.contentWindow.postMessage({ type: 'UPDATE_VIDEO_URL', url: data.videoUrl }, '*');
            }
        });
    </script>
</body>
</html>
