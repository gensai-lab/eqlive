<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kactuif - Tsunami Info Overlay</title>
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            background: url('assets/cover/cover.jpg') no-repeat center center;
            background-size: cover;
            font-family: 'UDKakugoLarge', sans-serif;
            color: var(--text-white);
            display: grid;
            /* 右側のパネル幅を維持し、左側を広げたレイアウト */
            grid-template-columns: 1280px 640px;
            grid-template-rows: 1fr; 
        }

        .main-content {
            grid-column: 1;
            grid-row: 1;
            padding: 155px 0 0 40px;
            position: relative;
        }

        .video-container {
            width: 1215px;
            height: 675px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-radius: 8px; 
        }

        #mainVideoDisplay, #imageDisplay {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tsunami-panel {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 0 40px 40px 0;
            gap: 20px;
        }

        /* 中身を空にし、不透明度を0%に設定 */
        .info-top-frame {
            width: 600px;
            height: 146px;
            border: none;
            background-color: transparent;
            border-radius: 8px;
            opacity: 0;
        }

        .info-mid-frame {
            width: 600px;
            height: 135px;
            border: none;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
        }

        .tsunami-list-frame {
            width: 600px;
            height: 310px;
            border: none;
            background-color: #fff;
            border-radius: 8px;
        }

        /* 中身を空にし、不透明度を0%に設定 */
        .tsunami-frame {
            width: 600px;
            height: 350px;
            border: none;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 8px; 
            opacity: 0;
        }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="video-container">
            <!-- 動画表示エリア -->
            <video id="mainVideoDisplay" autoplay playsinline muted></video>
            <img id="imageDisplay" src="" alt="" style="display:none;">
        </div>
    </main>

    <aside class="tsunami-panel">
        <!-- 枠自体は維持しつつ非表示（about:blank） -->
        <iframe id="infoTopIframe" src="about:blank" class="info-top-frame" scrolling="no" allowtransparency="true"></iframe>
        
        <iframe id="infoMidIframe" src="news-ticker.html" class="info-mid-frame" scrolling="no" allowtransparency="true"></iframe>
        <iframe id="tsunamiListIframe" src="tsunami-list.html" class="tsunami-list-frame" scrolling="no" allowtransparency="true"></iframe>
        
        <!-- 枠自体は維持しつつ非表示（about:blank） -->
        <iframe id="tsunamiMapIframe" src="about:blank" class="tsunami-frame" scrolling="no" allowtransparency="true"></iframe>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 津波情報の受信と各iframeへの配信（表示中のもののみ）
        onValue(ref(db, 'tsunami'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const dataArray = Object.values(data).flat();
            const listIframe = document.getElementById('tsunamiListIframe').contentWindow;

            // 津波リストの更新（現在表示されているフレームのみ）
            if (listIframe.updateTsunamiList) {
                listIframe.updateTsunamiList(dataArray);
            }
        });

        // ライブ映像URLの取得
        onValue(ref(db, 'broadcast/current'), (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.videoUrl) return;
            
            const videoElement = document.getElementById('mainVideoDisplay');
            if (videoElement.src !== data.videoUrl) {
                videoElement.src = data.videoUrl;
            }
        });
    </script>
</body>
</html>
