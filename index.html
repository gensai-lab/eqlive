<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの減災ラボ - 放送システム</title>
    <style>
        /* フォント定義 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --warning-red: #d32f2f;
            --navy-blue: #1a237e;
            --clock-stroke: #003EB3; /* ご指定の色 */
            --text-white: #ffffff;
            --bg-dark: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            background: url('assets/cover/cover.png') no-repeat center center;
            background-size: cover;
            font-family: 'UDKakugoLarge', sans-serif;
            color: var(--text-white);
            display: grid;
            grid-template-columns: 1280px 640px; /* 右側パネルを少し広めに設定 */
            grid-template-rows: 840px 240px;
        }

        /* 映像投影エリア（少し浮かせるデザイン） */
        .main-content {
            grid-column: 1;
            grid-row: 1;
            padding: 40px 0 0 40px; /* 左と上に余白 */
            position: relative;
        }

        .video-container {
            width: 1200px;
            height: 675px; /* 16:9 */
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        #mainVideoDisplay, #imageDisplay {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 時計とバナー（映像の上に配置） */
        .video-overlay {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .clock {
            font-size: 90px;
            font-weight: bold; /* ウェイトB */
            color: var(--text-white);
            -webkit-text-stroke: 12px var(--clock-stroke); /* 外側6pt相当の縁取り */
            stroke-linejoin: round;
            paint-order: stroke fill;
            line-height: 1;
            font-feature-settings: "palt"; /* 文字詰め */
            text-shadow: none; /* 影なし */
        }

        .distributor-banner img {
            height: 70px;
            display: block;
        }

        /* サイドパネル（右側） */
        .side-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            background-color: rgba(26, 35, 126, 0.9); /* 紺色ベースの半透明 */
            display: flex;
            flex-direction: column;
        }

        .urgent-warning {
            background-color: var(--warning-red);
            font-size: 80px;
            font-weight: bold;
            text-align: center;
            padding: 30px 0;
            line-height: 1.2;
        }

        .info-header {
            background-color: #f0f0f0;
            color: var(--navy-blue);
            text-align: center;
            font-size: 36px;
            padding: 10px;
            font-weight: bold;
        }

        /* 下部テロップエリア */
        .bottom-ticker {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 0 40px 40px;
        }

        .ticker-sub {
            background-color: white;
            color: var(--warning-red);
            font-size: 48px;
            font-weight: bold;
            padding: 5px 30px;
            width: fit-content;
            border-radius: 5px 5px 0 0;
        }

        .ticker-main {
            background-color: var(--warning-red);
            font-size: 100px;
            font-weight: bold;
            padding: 10px 40px;
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <main class="main-content">
        <!-- 映像レイヤー -->
        <div class="video-container">
            <video id="mainVideoDisplay" autoplay playsinline muted></video>
            <img id="imageDisplay" src="" alt="" style="display:none;">
        </div>

        <!-- 時計レイヤー -->
        <div class="video-overlay">
            <div class="clock" id="liveClock">00：00</div>
            <div class="distributor-banner">
                <img id="distributorImg" src="assets/banner/distributor/bot.png">
            </div>
        </div>
    </main>

    <aside class="side-panel">
        <div class="urgent-warning">津波！逃げて！</div>
        <div class="info-header">最 新 情 報</div>
        <!-- ここに地震情報などのコンテンツが入る -->
    </aside>

    <footer class="bottom-ticker">
        <div class="ticker-sub" id="tickerSub">速報</div>
        <div class="ticker-main" id="tickerMain">最新の地震情報を確認中</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 時計更新（コロン全角）
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${h}：${m}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // 映像・情報制御
        const videoElem = document.getElementById('mainVideoDisplay');
        const imgElem = document.getElementById('imageDisplay');
        let currentStream = null;

        onValue(ref(db, 'broadcast/current'), async (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('tickerMain').innerText = data.tickerMain;
            document.getElementById('tickerSub').innerText = data.tickerSub || '速報';
            document.getElementById('distributorImg').src = data.statusType === 'ningen' ? 'assets/banner/distributor/ningen.png' : 'assets/banner/distributor/bot.png';

            // ソース切替ロジック
            if (data.sourceType === 'camera') {
                imgElem.style.display = 'none'; videoElem.style.display = 'block';
                if (!currentStream) {
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1920, height: 1080 } });
                    videoElem.srcObject = currentStream;
                }
            } else if (data.sourceType === 'screen') {
                imgElem.style.display = 'none'; videoElem.style.display = 'block';
                currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                videoElem.srcObject = currentStream;
            } else if (data.sourceType === 'image') {
                videoElem.style.display = 'none'; imgElem.style.display = 'block';
                imgElem.src = data.mediaUrl;
            }
        });
    </script>
</body>
</html>
