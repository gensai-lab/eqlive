<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの減災ラボ - 放送システム</title>
    <style>
        /* 前回のフォント・変数定義を継承 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --warning-red: #d32f2f;
            --navy-blue: #1a237e;
            --clock-stroke: #003EB3;
            --text-white: #ffffff;
            --bg-dark: #121212;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'UDKakugoLarge', sans-serif;
            color: var(--text-white);
            width: 1920px; height: 1080px;
            display: grid;
            grid-template-columns: 1380px 540px;
            grid-template-rows: 930px 150px;
        }

        /* 映像表示エリア */
        .main-content {
            grid-column: 1; grid-row: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #mainVideoDisplay {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #imageDisplay {
            width: 100%; height: 100%;
            object-fit: contain;
            display: none;
        }

        /* 時計とバナーのオーバーレイ */
        .video-overlay {
            position: absolute;
            top: 40px; left: 40px;
            z-index: 10;
            display: flex; flex-direction: row; align-items: center; gap: 20px;
        }

        .clock {
            font-size: 85px; font-weight: bold; color: var(--text-white);
            -webkit-text-stroke: 12px var(--clock-stroke);
            stroke-linejoin: round; paint-order: stroke fill;
            line-height: 1; font-feature-settings: "palt";
            text-shadow: none; letter-spacing: 0.05em;
        }

        .distributor-banner img { height: 75px; display: block; }

        /* サイド・テロップ */
        .side-panel { grid-column: 2; grid-row: 1 / 3; background-color: var(--bg-dark); border-left: 2px solid #333; }
        .urgent-warning { background-color: var(--warning-red); font-size: 72px; font-weight: 800; text-align: center; padding: 20px 0; }
        .bottom-ticker { grid-column: 1; grid-row: 2; background-color: var(--warning-red); padding-left: 40px; display: flex; flex-direction: column; justify-content: center; }
        .ticker-main { font-size: 84px; font-weight: 800; }
    </style>
</head>
<body>
    <main class="main-content">
        <!-- 映像用 -->
        <video id="mainVideoDisplay" autoplay playsinline muted></video>
        <!-- 画像用 -->
        <img id="imageDisplay" src="" alt="投影画像">

        <div class="video-overlay">
            <div class="clock" id="liveClock">00：00</div>
            <div class="distributor-banner">
                <img id="distributorImg" src="assets/banner/distributor/bot.png">
            </div>
        </div>
    </main>

    <aside class="side-panel">
        <div class="urgent-warning">津波！逃げて！</div>
    </aside>

    <footer class="bottom-ticker">
        <div class="ticker-main" id="tickerMain">最新情報を確認中</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 時計更新
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = 
                `${now.getHours().toString().padStart(2, '0')}：${now.getMinutes().toString().padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // 映像ソースの制御
        const videoElem = document.getElementById('mainVideoDisplay');
        const imgElem = document.getElementById('imageDisplay');
        let currentStream = null;

        onValue(ref(db, 'broadcast/current'), async (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // テロップ・バナー更新
            document.getElementById('tickerMain').innerText = data.tickerMain;
            document.getElementById('distributorImg').src = data.statusType === 'ningen' ? 'assets/banner/distributor/ningen.png' : 'assets/banner/distributor/bot.png';

            // ソース切り替え
            if (data.sourceType === 'camera') {
                imgElem.style.display = 'none';
                videoElem.style.display = 'block';
                setupCamera();
            } else if (data.sourceType === 'screen') {
                imgElem.style.display = 'none';
                videoElem.style.display = 'block';
                setupScreenShare();
            } else if (data.sourceType === 'image') {
                videoElem.style.display = 'none';
                imgElem.style.display = 'block';
                imgElem.src = data.mediaUrl || '';
            }
        });

        async function setupCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1920, height: 1080 } });
            videoElem.srcObject = currentStream;
        }

        async function setupScreenShare() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            videoElem.srcObject = currentStream;
        }
    </script>
</body>
</html>
