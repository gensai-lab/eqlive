<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>みんなの減災ラボ - 放送システム</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --clock-stroke: #003EB3;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            background: url('assets/cover/cover.png') no-repeat center center;
            background-size: cover;
            font-family: 'UDKakugoLarge', sans-serif;
            color: var(--text-white);
            position: relative;
        }

        /* メインビデオエリア */
        .main-content {
            position: absolute;
            top: 40px;
            left: 40px;
        }

        .video-container {
            width: 1200px;
            height: 675px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        #mainVideoDisplay, #imageDisplay {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 時計・バナー */
        .video-overlay {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .clock {
            font-size: 90px;
            font-weight: bold;
            color: var(--text-white);
            -webkit-text-stroke: 12px var(--clock-stroke);
            stroke-linejoin: round;
            paint-order: stroke fill;
            line-height: 1;
            font-feature-settings: "palt";
        }

        .distributor-banner img {
            height: 70px;
        }

        /* 下部テロップ (title.html) */
        .bottom-ticker-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 1200px;
        }

        .title-frame {
            width: 100%;
            height: 210px; 
            border: none;
            background: transparent;
            overflow: hidden;
        }

        /* --- 津波マップコンテナ (右下) --- */
        #tsunami-map-widget {
            position: absolute;
            right: 40px;
            bottom: 40px;
            width: 600px;  /* 右側の空きスペースにフィット */
            height: 1000px; /* 縦長に配置 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #tsunami-map-widget svg {
            width: 100% !important;
            height: 100% !important;
        }

        /* 陸地と津波線のスタイル */
        .pref-path { fill: #BFBFBF; stroke: #BFBFBF; stroke-width: 0.5px; }
        .tsunami-path { fill: none; stroke: none; }
    </style>
</head>
<body>
    <!-- 左側：コンテンツエリア -->
    <main class="main-content">
        <div class="video-container">
            <video id="mainVideoDisplay" autoplay playsinline muted></video>
            <img id="imageDisplay" src="" alt="" style="display:none;">
        </div>
        <div class="video-overlay">
            <div class="clock" id="liveClock">00：00</div>
            <div class="distributor-banner">
                <img id="distributorImg" src="assets/banner/distributor/bot.png">
            </div>
        </div>
    </main>

    <!-- 下部：テロップ -->
    <footer class="bottom-ticker-container">
        <iframe src="title.html" class="title-frame" scrolling="no" allowtransparency="true"></iframe>
    </footer>

    <!-- 右側：津波マップ -->
    <div id="tsunami-map-widget"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 時計更新
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${h}：${m}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // 配信者バナー更新
        onValue(ref(db, 'broadcast/current'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            document.getElementById('distributorImg').src = data.statusType === 'ningen' ? 'assets/banner/distributor/ningen.png' : 'assets/banner/distributor/bot.png';
        });

        // --- 津波マップロジック ---
        const testData = {
            "areas": [
                { "grade": "Warning", "name": "北海道太平洋沿岸中部" },
                { "grade": "Warning", "name": "青森県太平洋沿岸" },
                { "grade": "Warning", "name": "岩手県" },
                { "grade": "Watch", "name": "宮城県" },
                { "grade": "Watch", "name": "福島県" }
            ],
            "cancelled": false
        };

        async function applyTsunamiData(tsunamiSvg, data) {
            tsunamiSvg.selectAll("path").style("stroke", "none");
            if (data.cancelled) return;

            const baseWidth = 10; // 右下に合わせて少し細めに調整
            data.areas.forEach(area => {
                const areaName = area.name.trim();
                let color = "none", width = 0;

                if (area.grade === "MajorWarning") { color = "#C91EFB"; width = baseWidth * 2; }
                else if (area.grade === "Warning") { color = "#DE080A"; width = baseWidth; }
                else if (area.grade === "Watch") { color = "#FEDC00"; width = baseWidth; }

                const target = tsunamiSvg.selectAll("path").filter(function() {
                    const id = d3.select(this).attr("id");
                    return id && (id === areaName || id.includes(areaName));
                });

                if (!target.empty()) {
                    target.style("stroke", color).style("stroke-width", `${width}px`).style("stroke-linecap", "round").raise();
                }
            });
        }

        async function initTsunamiMap() {
            const [prefXml, tsunamiXml] = await Promise.all([
                d3.xml("assets/svg/pref.svg"),
                d3.xml("assets/svg/tsunami2_id.svg")
            ]);

            const container = d3.select("#tsunami-map-widget");
            const prefSvg = container.append(() => prefXml.documentElement);
            const tsunamiSvg = container.append(() => tsunamiXml.documentElement);

            tsunamiSvg.style("position", "absolute");
            prefSvg.selectAll("path").classed("pref-path", true);
            tsunamiSvg.selectAll("path").classed("tsunami-path", true);

            const autoFit = (svgNode) => {
                const bbox = svgNode.getBBox();
                const margin = 10;
                svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
                svgNode.removeAttribute("width");
                svgNode.removeAttribute("height");
            };

            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
            applyTsunamiData(tsunamiSvg, testData);
        }

        initTsunamiMap();
    </script>
</body>
</html>
