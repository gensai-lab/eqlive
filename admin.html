<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* フォント定義 */
        @font-face {
            font-family: 'UDKakugoLarge';
            src: url('./assets/fonts/FOT-UDKakugo_LargePr6-B.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --warning-red: #d32f2f;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 100px; /* 確認用に余白を広げています */
            background-color: #222;
            font-family: 'UDKakugoLarge', sans-serif;
        }

        /* タイトル全体のコンテナ */
        .title-container {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        /* サブボックス（白）: 右下・左下 0px / 右上・左上 8px */
        .subtitle-box {
            position: absolute;
            top: -55px;
            left: 0;
            background-color: var(--text-white);
            color: var(--warning-red);
            font-size: 48px;
            font-weight: bold;
            padding: 4px 25px;
            /* 角丸設定 */
            border-radius: 8px 8px 0px 0px; 
            z-index: 2;
            white-space: nowrap;
            font-feature-settings: "palt";
        }

        /* メインボックス（赤）: 左上・左下 0px / 右上・右下 8px */
        .main-title-box {
            position: relative;
            background-color: var(--warning-red);
            color: var(--text-white);
            font-size: 96px;
            font-weight: bold;
            padding: 12px 45px;
            /* 角丸設定 */
            border-radius: 0px 8px 8px 0px; 
            z-index: 1;
            white-space: nowrap;
            font-feature-settings: "palt";
            line-height: 1.1;
        }

        /* 左側の白いライン装飾 */
        .main-title-box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            background-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="title-container">
        <!-- サブボックス -->
        <div class="subtitle-box" id="displaySubtitle">
            青森で震度5強
        </div>
        <!-- メインボックス -->
        <div class="main-title-box" id="displayMainTitle">
            北海道・青森・岩手に津波警報
        </div>
    </div>

</body>
</html>
