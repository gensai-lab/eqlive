<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理パネル - みんなの減災ラボ</title>
    <style>
        :root {
            --primary-blue: #1a237e;
            --bg-gray: #f4f4f9;
            --accent-red: #d32f2f;
        }
        body { font-family: sans-serif; background-color: var(--bg-gray); padding: 20px; display: flex; justify-content: center; }
        .admin-container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        h1 { font-size: 20px; color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-top: 0; }
        
        /* タブデザイン */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #ccc; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; border-radius: 8px 8px 0 0; font-weight: bold; }
        .tab-btn.active { background: var(--primary-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-update { background-color: var(--primary-blue); color: white; width: 100%; }
        .btn-reset { background-color: #666; color: white; }
        
        .news-item { background: #f9f9f9; padding: 10px; border-left: 4px solid var(--primary-blue); margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
        .news-item input { flex: 1; }
        .btn-remove { background: var(--accent-red); color: white; padding: 5px 10px; font-size: 12px; }
        .btn-add { background: #4caf50; color: white; margin-bottom: 10px; width: auto; padding: 8px 15px; }

        @media (max-width: 480px) { .btn-group { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Kactuif 配信管理システム</h1>
    
    <!-- タブ切り替えボタン -->
    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('tab-program')">番組管理</div>
        <div class="tab-btn" onclick="showTab('tab-sokuhou')">速報管理</div>
        <div class="tab-btn" onclick="showTab('tab-news')">ニュース管理</div>
    </div>

    <!-- 番組管理タブ -->
    <div id="tab-program" class="tab-content active">
        <div class="form-group">
            <label for="statusType">配信モード</label>
            <select id="statusType">
                <option value="bot">自動（Bot）</option>
                <option value="ningen">人間による配信</option>
            </select>
        </div>
        <button class="btn-update" onclick="saveData('program')">配信モードを更新</button>
    </div>

    <!-- 速報管理タブ -->
    <div id="tab-sokuhou" class="tab-content">
        <div class="form-group">
            <label for="subtitle">サブテキスト（震源地など）</label>
            <input type="text" id="subtitle" placeholder="例：青森県東方沖で震度5強">
        </div>
        <div class="form-group">
            <label for="mainTitle">メインタイトル（警報・注意報など）</label>
            <textarea id="mainTitle" rows="3" placeholder="例：北海道・青森に津波警報を発表しました"></textarea>
        </div>
        <div class="btn-group">
            <button class="btn-update" onclick="saveData('sokuhou')">速報を反映</button>
            <button class="btn-reset" id="resetBtn">リセット</button>
        </div>
    </div>

    <!-- ニュース管理タブ（テロップ用） -->
    <div id="tab-news" class="tab-content">
        <label>手動ニュース一覧（テロップに流れます）</label>
        <div id="news-list-container">
            <!-- ここにニュース入力欄が追加されます -->
        </div>
        <button class="btn-add" onclick="addNewsInput()">＋ ニュース項目を追加</button>
        <button class="btn-update" onclick="saveData('news')">ニュースを保存・反映</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, update, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        authDomain: "mgl-eqlive.firebaseapp.com",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        storageBucket: "mgl-eqlive.firebasestorage.app",
        messagingSenderId: "1060231327645",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // タブ切り替え機能
    window.showTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    // ニュース入力欄の追加・削除
    window.addNewsInput = (value = "") => {
        const container = document.getElementById('news-list-container');
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `
            <input type="text" class="news-input" value="${value}" placeholder="ニュースの内容を入力">
            <button class="btn-remove" onclick="this.parentElement.remove()">削除</button>
        `;
        container.appendChild(div);
    };

    // Firebaseデータの保存
    window.saveData = (mode) => {
        if (mode === 'program') {
            update(ref(db, 'broadcast/current'), {
                statusType: document.getElementById('statusType').value,
                updatedAt: Date.now()
            }).then(() => alert('配信モードを更新しました'));
        } 
        else if (mode === 'sokuhou') {
            update(ref(db, 'broadcast/current'), {
                subtitle: document.getElementById('subtitle').value,
                mainTitle: document.getElementById('mainTitle').value,
                updatedAt: Date.now()
            }).then(() => alert('速報を反映しました'));
        }
        else if (mode === 'news') {
            const newsData = [];
            document.querySelectorAll('.news-input').forEach(input => {
                if (input.value.trim()) newsData.push(input.value.trim());
            });
            set(ref(db, 'broadcast/manual_news'), {
                items: newsData,
                updatedAt: Date.now()
            }).then(() => alert('ニュースを反映しました'));
        }
    };

    // 初期データ読み込み
    onValue(ref(db, 'broadcast/current'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('statusType').value = data.statusType || 'bot';
            document.getElementById('subtitle').value = data.subtitle || '';
            document.getElementById('mainTitle').value = data.mainTitle || '';
        }
    });

    onValue(ref(db, 'broadcast/manual_news'), (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('news-list-container');
        container.innerHTML = '';
        if (data && data.items) {
            data.items.forEach(text => addNewsInput(text));
        } else {
            addNewsInput(); // 最初は1つ空欄を表示
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        if(confirm('速報入力をリセットしますか？')) {
            document.getElementById('subtitle').value = '';
            document.getElementById('mainTitle').value = '';
        }
    });
</script>

</body>
</html>
