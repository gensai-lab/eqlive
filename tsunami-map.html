<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #map-container { width: 100vw; height: 100vh; position: relative; }
        svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* 都道府県の初期スタイル */
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        
        /* 津波予報区の初期スタイル */
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2px; transition: stroke 0.3s; }
    </style>
</head>
<body>

<div id="map-container">
    <div id="pref-layer"></div>
    <div id="tsunami-layer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase設定
    const config = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive"
    };
    const db = getDatabase(initializeApp(config));

    // 両方のSVGを読み込む
    Promise.all([
        d3.xml("assets/svg/pref.svg"),
        d3.xml("assets/svg/tsunami_id.svg")
    ]).then(([prefXml, tsunamiXml]) => {
        // 都道府県レイヤー
        const prefNode = document.getElementById("pref-layer");
        prefNode.appendChild(prefXml.documentElement);
        d3.select("#pref-layer svg").selectAll("path").classed("pref-path", true);

        // 津波レイヤー
        const tsunamiNode = document.getElementById("tsunami-layer");
        tsunamiNode.appendChild(tsunamiXml.documentElement);
        const tsunamiSvg = d3.select("#tsunami-layer svg");
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        // Firebase監視
        onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
            const data = snapshot.val() || {};
            
            tsunamiSvg.selectAll("path").each(function() {
                const code = d3.select(this).attr("id");
                const level = data[code];
                
                let color = "rgba(255,255,255,0.2)";
                let width = "2px";

                if (level === 'major') { color = "#C91EFB"; width = "12px"; }
                else if (level === 'warning') { color = "#DE080A"; width = "9px"; }
                else if (level === 'advisory') { color = "#FEDC00"; width = "6px"; }

                d3.select(this)
                    .style("stroke", color)
                    .style("stroke-width", width);
            });
        });
    });
</script>
</body>
</html>
