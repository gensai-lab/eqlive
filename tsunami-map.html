<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            /* 指定されたカラーコード */
            --major-warning: #C91EFB; /* 大津波警報 */
            --warning: #DE080A;       /* 津波警報 */
            --advisory: #FEDC00;      /* 津波注意報 */
            --land: #BFBFBF;          /* 陸地 */
            
            --none: #00266e;          /* 予報なし（海） */
            --map-bg: #001233;        /* 背景（深い海） */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--map-bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* 陸地のスタイル */
        .land {
            fill: var(--land);
            stroke: #888;
            stroke-width: 0.2;
        }

        /* 津波予報区のスタイル */
        .tsunami-area {
            fill: var(--none);
            stroke: #ffffff;
            stroke-width: 0.4;
            transition: fill 0.5s;
        }

        /* 凡例 */
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-family: 'UDKakugoLarge', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #555;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .dot { width: 16px; height: 16px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--major-warning)"></div>大津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--warning)"></div>津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--advisory)"></div>津波注意報</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const svg = d3.select("#map").append("svg")
            .attr("viewBox", `0 0 800 800`);

        const projection = d3.geoMercator()
            .center([138, 38])
            .scale(1600)
            .translate([400, 400]);

        const path = d3.geoPath().projection(projection);

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            
            // 陸地を描画 (todoufuken.json)
            svg.append("g")
                .selectAll("path")
                .data(topojson.feature(landData, landData.objects.japan).features)
                .enter().append("path")
                .attr("class", "land")
                .attr("d", path);

            // 津波予報区を描画 (tsunami.json)
            const areas = svg.append("g")
                .selectAll("path")
                .data(topojson.feature(tsunamiData, tsunamiData.objects.tsunami_area).features)
                .enter().append("path")
                .attr("class", "tsunami-area")
                .attr("id", d => `area-${d.properties.code}`)
                .attr("d", path);

            // Firebaseの津波情報を監視
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                areas.style("fill", d => {
                    const level = status[d.properties.code]; 
                    if (level === 'major') return "var(--major-warning)";
                    if (level === 'warning') return "var(--warning)";
                    if (level === 'advisory') return "var(--advisory)";
                    return "var(--none)";
                });
            });
        });
    </script>
</body>
</html>
