<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        
        #map-container {
            width: 100vw; height: 100vh;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* レイヤー構造の設定 */
        .layer {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 下のレイヤーへのクリックを阻害しない */
        }

        /* 背面カバー：縦幅100%固定 */
        #cover-layer { z-index: 1; }
        #cover-layer svg { height: 100% !important; width: auto !important; }

        /* 地図レイヤー */
        #pref-layer { z-index: 2; }
        #tsunami-layer { z-index: 3; }

        svg { object-fit: contain; }
        
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2px; transition: stroke 0.3s; }
    </style>
</head>
<body>

<div id="map-container">
    <div id="cover-layer" class="layer"></div>
    <div id="pref-layer" class="layer"></div>
    <div id="tsunami-layer" class="layer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive"
    };
    const db = getDatabase(initializeApp(config));

    async function initProject() {
        const [coverXml, prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/tsunami_cover.svg"),
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const autoFit = (svgNode) => {
            const bbox = svgNode.getBBox();
            const margin = 10;
            svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
            svgNode.removeAttribute("width");
            svgNode.removeAttribute("height");
        };

        // 1. 背面カバー (AutoFitさせず、元の比率のまま縦100%にする)
        const coverSvg = d3.select("#cover-layer").append(() => coverXml.documentElement);
        coverSvg.style("height", "100%").style("width", "auto");

        // 2. 都道府県レイヤー
        const prefSvg = d3.select("#pref-layer").append(() => prefXml.documentElement);
        prefSvg.selectAll("path").classed("pref-path", true);

        // 3. 津波レイヤー
        const tsunamiSvg = d3.select("#tsunami-layer").append(() => tsunamiXml.documentElement);
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        // 前回のサイズ問題を解決するためのAutoFit適用
        setTimeout(() => {
            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
        }, 100);

        // Firebase監視
        onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
            const data = snapshot.val() || {};
            tsunamiSvg.selectAll("path").each(function() {
                const code = d3.select(this).attr("id");
                const level = data[code];
                let color = "rgba(255,255,255,0.2)", width = "2px";

                if (level === 'major') { color = "#C91EFB"; width = "12px"; }
                else if (level === 'warning') { color = "#DE080A"; width = "9px"; }
                else if (level === 'advisory') { color = "#FEDC00"; width = "6px"; }

                d3.select(this).style("stroke", color).style("stroke-width", width);
            });
        });
    }

    initProject();
</script>
</body>
</html>
