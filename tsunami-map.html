<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --map-bg: #000000;
            --line-default: rgba(255, 255, 255, 0.2);
            --inset-border: rgba(255, 255, 255, 0.5);
        }

        body { margin: 0; background: var(--map-bg); overflow: hidden; font-family: sans-serif; }
        svg { width: 100vw; height: 100vh; }

        /* 描画スタイル */
        .land { fill: var(--land); stroke: #444; stroke-width: 0.1px; }
        .tsunami-line { fill: none; stroke-linejoin: round; stroke-linecap: round; transition: stroke 0.3s; }
        
        .inset-frame { fill: none; stroke: var(--inset-border); stroke-width: 1.5px; }
        .inset-text { fill: #fff; font-size: 22px; font-weight: bold; }

        /* 凡例 */
        .legend {
            position: absolute; bottom: 40px; right: 40px;
            display: flex; gap: 30px;
        }
        .v-text { writing-mode: vertical-rl; color: #fff; font-size: 28px; font-weight: bold; letter-spacing: 0.2em; }
        .l-bar { width: 60px; height: 12px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="map-container"></div>
<div class="legend">
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="l-bar" style="background:var(--warning)"></div><span class="v-text">津波警報</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="l-bar" style="background:var(--advisory)"></div><span class="v-text">津波注意報</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive",
        appId: "1:1060231327645:web:642684f4640bbc21d5c974"
    };
    const db = getDatabase(initializeApp(firebaseConfig));

    const WIDTH = 1920, HEIGHT = 1080;
    const svg = d3.select("#map-container").append("svg").attr("viewBox", `0 0 ${WIDTH} ${HEIGHT}`);

    // --- 各地域の「切り出し」設定 ---
    const REGIONS = [
        { id: "main", center: [138.5, 38.0], scale: 3500, translate: [WIDTH/2 + 200, HEIGHT/2], clip: null },
        { id: "oki", label: "沖縄・奄美", center: [127.5, 26.3], scale: 2400, translate: [280, 260], clip: [40, 40, 480, 440] },
        { id: "oga", label: "小笠原", center: [142.2, 27.0], scale: 4500, translate: [WIDTH-450, HEIGHT-350], clip: [WIDTH-650, HEIGHT-550, 420, 450] }
    ];

    async function loadAndRender() {
        const [landData, tsunamiData] = await Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]);

        const landGeo = topojson.feature(landData, landData.objects[Object.keys(landData.objects)[0]]);
        const tsunamiGeo = topojson.feature(tsunamiData, tsunamiData.objects[Object.keys(tsunamiData.objects)[0]]);

        REGIONS.forEach(reg => {
            const proj = d3.geoMercator().center(reg.center).scale(reg.scale).translate(reg.translate);
            const path = d3.geoPath().projection(proj);
            const g = svg.append("g").attr("id", `g-${reg.id}`);

            // クリッピング（枠外はみ出し防止）
            if (reg.clip) {
                const [x, y, w, h] = reg.clip;
                const clipId = `clip-${reg.id}`;
                svg.append("defs").append("clipPath").attr("id", clipId).append("rect").attr("x", x).attr("y", y).attr("width", w).attr("height", h);
                g.attr("clip-path", `url(#${clipId})`);
                
                // 枠線とラベル
                svg.append("path").attr("class", "inset-frame").attr("d", `M${x+w},${y} L${x},${y} L${x},${y+h} L${x+w/3},${y+h}`);
                svg.append("text").attr("class", "inset-text").attr("x", x+20).attr("y", y+45).text(reg.label);
            }

            // 陸地
            g.append("g").selectAll("path").data(landGeo.features).enter().append("path").attr("class", "land").attr("d", path);

            // 津波ライン
            const lines = g.append("g").selectAll("path").data(tsunamiGeo.features).enter().append("path")
                .attr("class", "tsunami-line").attr("d", path)
                .style("stroke", "var(--line-default)").style("stroke-width", "3px");

            // Firebase同期
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                lines.each(function(d) {
                    const code = d.properties.code || d.id;
                    const level = status[code];
                    let sColor = "var(--line-default)", sWidth = "3px";
                    
                    if (level === 'major') { sColor = "var(--major-warning)"; sWidth = "12px"; }
                    else if (level === 'warning') { sColor = "var(--warning)"; sWidth = "9px"; }
                    else if (level === 'advisory') { sColor = "var(--advisory)"; sWidth = "6px"; }
                    
                    d3.select(this).style("stroke", sColor).style("stroke-width", sWidth);
                });
            });
        });
    }

    loadAndRender();
</script>
</body>
</html>
