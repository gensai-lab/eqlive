<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --canvas-width: 1857.03px; }
        body { margin: 0; background: #000; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #main-canvas { width: var(--canvas-width); height: 100vh; position: relative; display: flex; align-items: center; justify-content: flex-start; overflow: hidden; }
        #background-cover { position: absolute; top: 0; left: 0; width: var(--canvas-width); height: 100%; z-index: -1; object-fit: cover; }
        #map-container { width: 85%; height: 90%; position: relative; margin-left: -70px; display: flex; justify-content: center; align-items: center; }
        
        svg { position: absolute; width: 100% !important; height: 100% !important; top: 0; left: 0; object-fit: contain; }
        
        /* 都道府県の境界線を陸地（#BFBFBF）と同じ色に設定 */
        .pref-path { fill: #BFBFBF; stroke: #BFBFBF; stroke-width: 0.5px; }
        
        /* 津波予報線の初期状態（さらに視認性を上げるため少し不透明度アップ） */
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 4px; transition: stroke 0.5s, stroke-width 0.5s; }
    </style>
</head>
<body>

<div id="main-canvas">
    <img id="background-cover" src="assets/cover/tsunami_cover.png" alt="background">
    <div id="map-container"></div>
</div>

<script type="module">
    // テスト用データ
    const testData = [
        {
            "areas": [
                { "grade": "Warning", "name": "北海道太平洋沿岸中部" },
                { "grade": "Warning", "name": "青森県太平洋沿岸" },
                { "grade": "Warning", "name": "岩手県" },
                { "grade": "Watch", "name": "北海道太平洋沿岸東部" },
                { "grade": "Watch", "name": "北海道太平洋沿岸西部" },
                { "grade": "Watch", "name": "青森県日本海沿岸" },
                { "grade": "Watch", "name": "宮城県" },
                { "grade": "Watch", "name": "福島県" }
            ],
            "cancelled": false
        }
    ];

    async function runTest(tsunamiSvg) {
        console.log("テストデータを適用中...");
        const latestTsunami = testData[0];
        
        // 全パスをリセット
        tsunamiSvg.selectAll("path")
            .style("stroke", "rgba(255,255,255,0.3)")
            .style("stroke-width", "4px");

        if (latestTsunami.cancelled) return;

        latestTsunami.areas.forEach(area => {
            const areaName = area.name.trim(); // 空白対策
            const grade = area.grade;

            let color = "rgba(255,255,255,0.3)";
            let width = "4px";

            // ご要望に合わせてさらに太く設定
            if (grade === "MajorWarning") { color = "#C91EFB"; width = "25px"; }
            else if (grade === "Warning") { color = "#DE080A"; width = "18px"; }
            else if (grade === "Watch") { color = "#FEDC00"; width = "12px"; }

            // IDとの照合
            const targetPath = tsunamiSvg.select(`path[id="${areaName}"]`);
            
            if (!targetPath.empty()) {
                targetPath
                    .style("stroke", color)
                    .style("stroke-width", width)
                    .style("stroke-linecap", "round") // 角を丸くして繋がりを自然に
                    .raise(); // 最前面へ
            } else {
                console.warn(`予報区「${areaName}」がSVG内で見つかりません。IDを確認してください。`);
            }
        });
    }

    async function init() {
        const [prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const container = d3.select("#map-container");
        const prefSvg = container.append(() => prefXml.documentElement);
        const tsunamiSvg = container.append(() => tsunamiXml.documentElement);
        
        tsunamiSvg.style("position", "absolute").style("z-index", "10");

        prefSvg.selectAll("path").classed("pref-path", true);
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        const autoFit = (svgNode) => {
            const bbox = svgNode.getBBox();
            const margin = 10;
            svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
            svgNode.removeAttribute("width");
            svgNode.removeAttribute("height");
            svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
        };

        setTimeout(() => {
            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
            runTest(tsunamiSvg);
        }, 200);
    }

    init();
</script>
</body>
</html>
