<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --map-bg: #000000;
            --no-tsunami: rgba(255, 255, 255, 0.25);
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg { width: 100%; height: 100%; }

        /* 陸地：境界線を少しだけ濃くして視認性アップ */
        .land { fill: var(--land); stroke: #666; stroke-width: 0.1px; }
        
        /* 津波予報線：角を丸くしてニュース風に */
        .tsunami-area { 
            fill: none; 
            transition: stroke 0.5s, stroke-width 0.5s; 
            stroke-linejoin: round; 
            stroke-linecap: round; 
        }

        /* インセットの枠線 */
        .inset-line {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.2px;
            opacity: 0.6;
        }

        .inset-label {
            fill: white;
            font-size: 20px;
            font-weight: bold;
            filter: drop-shadow(1px 1px 2px black);
        }

        /* 凡例：右下に固定 */
        .legend {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            gap: 25px;
        }
        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-weight: bold;
        }
        .legend-bar {
            width: 50px;
            height: 10px;
            margin-bottom: 12px;
        }
        .v-text {
            writing-mode: vertical-rl;
            font-size: 26px;
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-bar" style="background:var(--warning)"></div>
                <span class="v-text">津波警報</span>
            </div>
            <div class="legend-item">
                <div class="legend-bar" style="background:var(--advisory)"></div>
                <span class="v-text">津波注意報</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 16:9 放送用サイズ
        const width = 1280;
        const height = 720;
        const svg = d3.select("#map").append("svg").attr("viewBox", `0 0 ${width} ${height}`);

        // --- 投影設定（位置を微調整） ---
        // メイン：北海道が切れないよう少し下げ、全体を右寄りに
        const projMain = d3.geoMercator().center([138.5, 37.5]).scale(2200).translate([width / 2 + 150, height / 2 + 50]);
        // 沖縄：枠内にしっかり収まるスケール
        const projOkinawa = d3.geoMercator().center([127.5, 26.3]).scale(1600).translate([200, 220]);
        // 小笠原：見えやすい倍率
        const projOgasawara = d3.geoMercator().center([142.2, 27.0]).scale(3000).translate([850, 520]);

        const pathMain = d3.geoPath().projection(projMain);
        const pathOkinawa = d3.geoPath().projection(projOkinawa);
        const pathOgasawara = d3.geoPath().projection(projOgasawara);

        // インセット枠の描画関数
        const drawInset = (x, y, w, h, label) => {
            const g = svg.append("g");
            g.append("path").attr("class", "inset-line").attr("d", `M${x+w},${y} L${x},${y} L${x},${y+h} L${x+w/3},${y+h}`);
            g.append("text").attr("class", "inset-label").attr("x", x + 15).attr("y", y + 35).text(label);
        };

        // 枠の位置調整
        drawInset(50, 50, 300, 340, "沖縄・奄美");
        drawInset(780, 380, 280, 300, "小笠原");

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];
            const land = topojson.feature(landData, landData.objects[landKey]);
            const tsunami = topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]);

            const renderGroup = (name, pathGenerator, clipRect) => {
                const g = svg.append("g");
                if (clipRect) {
                    const clipId = `clip-${name}`;
                    svg.append("defs").append("clipPath").attr("id", clipId)
                       .append("rect").attr("x", clipRect.x).attr("y", clipRect.y).attr("width", clipRect.w).attr("height", clipRect.h);
                    g.attr("clip-path", `url(#${clipId})`);
                }

                g.append("g").selectAll("path").data(land.features).enter().append("path")
                    .attr("class", "land").attr("d", pathGenerator);

                return g.append("g").selectAll("path").data(tsunami.features).enter().append("path")
                    .attr("class", "tsunami-area").attr("d", pathGenerator)
                    .style("stroke", "var(--no-tsunami)").style("stroke-width", "2px");
            };

            const areasMain = renderGroup("main", pathMain, null);
            const areasOki = renderGroup("oki", pathOkinawa, {x:50, y:50, w:300, h:340});
            const areasOga = renderGroup("oga", pathOgasawara, {x:780, y:380, w:280, h:300});

            // Firebase更新
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                [areasMain, areasOki, areasOga].forEach(group => {
                    group.style("stroke", d => {
                        const level = status[d.properties.code || d.id];
                        if (level === 'major') return "var(--major-warning)";
                        if (level === 'warning') return "var(--warning)";
                        if (level === 'advisory') return "var(--advisory)";
                        return "var(--no-tsunami)";
                    }).style("stroke-width", d => status[d.properties.code || d.id] ? "6px" : "2px");
                });
            });
        });
    </script>
</body>
</html>
