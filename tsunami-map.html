<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --canvas-width: 1857.03px;
        }

        body {
            margin: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #main-canvas {
            width: var(--canvas-width);
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        #background-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--canvas-width);
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        #map-container {
            width: 85%;  
            height: 90%; 
            position: relative;
            margin-left: -70px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        svg {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            object-fit: contain;
        }
        
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        /* 初期状態の予報線は透明に近い白 */
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 2px; transition: stroke 0.5s, stroke-width 0.5s; }
    </style>
</head>
<body>

<div id="main-canvas">
    <img id="background-cover" src="assets/cover/tsunami_cover.png" alt="background">
    <div id="map-container"></div>
</div>

<script type="module">
    const API_URL = "https://api.p2pquake.net/v2/history?codes=552&limit=1";

    async function updateTsunamiInformation(tsunamiSvg) {
        try {
            const response = await fetch(API_URL);
            const history = await response.json();
            if (history.length === 0) return;

            const latestTsunami = history[0];
            const areas = latestTsunami.areas || [];

            // 全てのパスを一旦初期化
            tsunamiSvg.selectAll("path")
                .style("stroke", "rgba(255,255,255,0.15)")
                .style("stroke-width", "2px");

            // 取得したエリア情報を地図に反映
            areas.forEach(area => {
                const code = area.code;
                const grade = area.grade; // 大津波警報, 津波警報, 津波注意報

                let color = "rgba(255,255,255,0.15)";
                let width = "2px";

                // P2P地震情報のgradeに基づいた判定
                if (grade === "MajorWarning") { // 大津波警報
                    color = "#C91EFB"; 
                    width = "14px";
                } else if (grade === "Warning") { // 津波警報
                    color = "#DE080A"; 
                    width = "10px";
                } else if (grade === "Watch") { // 津波注意報
                    color = "#FEDC00"; 
                    width = "7px";
                }

                // IDが一致するパスの色を更新
                tsunamiSvg.select(`path[id="${code}"]`)
                    .style("stroke", color)
                    .style("stroke-width", width);
            });

            console.log("津波情報を更新しました:", new Date().toLocaleTimeString());
        } catch (error) {
            console.error("APIの取得に失敗しました:", error);
        }
    }

    async function init() {
        const [prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const container = d3.select("#map-container");

        const prefSvg = container.append(() => prefXml.documentElement);
        const tsunamiSvg = container.append(() => tsunamiXml.documentElement);
        tsunamiSvg.style("position", "absolute");

        prefSvg.selectAll("path").classed("pref-path", true);
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        const autoFit = (svgNode) => {
            const bbox = svgNode.getBBox();
            const margin = 10;
            svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
            svgNode.removeAttribute("width");
            svgNode.removeAttribute("height");
            svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
        };

        setTimeout(() => {
            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
            
            // 初回実行
            updateTsunamiInformation(tsunamiSvg);
            // 30秒ごとにAPIをチェック（みんなの減災ラボのリアルタイム運用に合わせて調整）
            setInterval(() => updateTsunamiInformation(tsunamiSvg), 30000);
        }, 150);
    }

    init();
</script>
</body>
</html>
