<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --canvas-width: 1857.03px;
        }

        body {
            margin: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 全ての親コンテナ */
        #main-canvas {
            width: var(--canvas-width);
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 左寄せ */
            overflow: hidden;
        }

        /* 背面のカバー画像（左端起点） */
        #background-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--canvas-width);
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* 地図コンテナ（左マージンを-70pxに設定） */
        #map-container {
            width: 85%;  
            height: 90%; 
            position: relative;
            margin-left: -70px; /* 地図をさらに左へ寄せる */
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        svg {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            object-fit: contain;
        }
        
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2.5px; transition: stroke 0.3s, stroke-width 0.3s; }
    </style>
</head>
<body>

<div id="main-canvas">
    <img id="background-cover" src="assets/cover/tsunami_cover.png" alt="background">
    <div id="map-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive"
    };
    const db = getDatabase(initializeApp(config));

    async function loadAndFixMaps() {
        const [prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const container = d3.select("#map-container");

        const prefSvg = container.append(() => prefXml.documentElement);
        const tsunamiSvg = container.append(() => tsunamiXml.documentElement);
        tsunamiSvg.style("position", "absolute");

        prefSvg.selectAll("path").classed("pref-path", true);
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        const autoFit = (svgNode) => {
            const bbox = svgNode.getBBox();
            const margin = 10;
            svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
            svgNode.removeAttribute("width");
            svgNode.removeAttribute("height");
            svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
        };

        setTimeout(() => {
            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
        }, 150);

        onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
            const data = snapshot.val() || {};
            tsunamiSvg.selectAll("path").each(function() {
                const code = d3.select(this).attr("id");
                const level = data[code];
                let color = "rgba(255,255,255,0.2)", width = "2.5px";

                if (level === 'major') { color = "#C91EFB"; width = "14px"; }
                else if (level === 'warning') { color = "#DE080A"; width = "10px"; }
                else if (level === 'advisory') { color = "#FEDC00"; width = "7px"; }

                d3.select(this).style("stroke", color).style("stroke-width", width);
            });
        });
    }

    loadAndFixMaps();
</script>
</body>
</html>
