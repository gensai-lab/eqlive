<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: transparent; /* iframeとして埋め込むため背景透過 */
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }
        
        #map-container { 
            width: auto;   /* 横幅は自動 */
            height: 100%;  /* 縦幅を100%に固定 */
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        svg { 
            height: 100% !important; /* 縦幅を基準にする */
            width: auto !important;   /* 横幅はアスペクト比を維持 */
            display: block;
        }
        
        /* 陸地と都道府県境界 */
        .pref-path { fill: #BFBFBF; stroke: #BFBFBF; stroke-width: 0.5px; }
        
        /* 津波線（初期状態は透明） */
        .tsunami-path { fill: none; stroke: none; }
    </style>
</head>
<body>

<div id="map-container"></div>

<script type="module">
    // テスト用データ
    const testData = [
        {
            "areas": [
                { "grade": "Warning", "name": "北海道太平洋沿岸中部" },
                { "grade": "Warning", "name": "青森県太平洋沿岸" },
                { "grade": "Warning", "name": "岩手県" },
                { "grade": "Watch", "name": "宮城県" },
                { "grade": "Watch", "name": "福島県" }
            ],
            "cancelled": false
        }
    ];

    async function applyTsunamiData(tsunamiSvg, data) {
        tsunamiSvg.selectAll("path").style("stroke", "none").style("stroke-width", "0");

        if (data.cancelled) return;

        const baseWidth = 14; 
        data.areas.forEach(area => {
            const areaName = area.name.trim();
            const grade = area.grade;
            
            let color = "none";
            let width = "0px";

            // 「みんなの減災ラボ」カラーパレット
            if (grade === "MajorWarning") { color = "#C91EFB"; width = `${baseWidth * 2}px`; } 
            else if (grade === "Warning") { color = "#DE080A"; width = `${baseWidth}px`; } 
            else if (grade === "Watch") { color = "#FEDC00"; width = `${baseWidth}px`; }

            const target = tsunamiSvg.selectAll("path").filter(function() {
                const id = d3.select(this).attr("id");
                return id && (id === areaName || id.includes(areaName));
            });

            if (!target.empty()) {
                target.style("stroke", color).style("stroke-width", width).style("stroke-linecap", "round").style("stroke-linejoin", "round").raise();
            }
        });
    }

    async function init() {
        try {
            const [prefXml, tsunamiXml] = await Promise.all([
                d3.xml("assets/svg/pref.svg"),
                d3.xml("assets/svg/tsunami2_id.svg")
            ]);

            const container = d3.select("#map-container");
            const prefSvg = container.append(() => prefXml.documentElement);
            const tsunamiSvg = container.append(() => tsunamiXml.documentElement);
            
            tsunamiSvg.style("position", "absolute");
            prefSvg.selectAll("path").classed("pref-path", true);
            tsunamiSvg.selectAll("path").classed("tsunami-path", true);

            const autoFit = (svgNode) => {
                const bbox = svgNode.getBBox();
                const margin = 5;
                svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
                // width/height属性を削除し、CSS側（100%）に任せる
                svgNode.removeAttribute("width");
                svgNode.removeAttribute("height");
                svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
            };

            setTimeout(() => {
                autoFit(prefSvg.node());
                autoFit(tsunamiSvg.node());
                applyTsunamiData(tsunamiSvg, testData[0]);
            }, 100);

        } catch (error) {
            console.error("SVG読み込み失敗:", error);
        }
    }
    init();
</script>
</body>
</html>
