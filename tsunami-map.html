<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB; /* 大津波警報 */
            --warning: #DE080A;       /* 津波警報 */
            --advisory: #FEDC00;      /* 津波注意報 */
            --land: #BFBFBF;          /* 陸地：指定色 */
            --map-bg: #001233;        /* 背景（深い海） */
            --no-tsunami: #ffffff;    /* 予報なし（白） */
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; }
        svg { width: 100%; height: 100%; }

        .land {
            fill: var(--land);
            stroke: #777;
            stroke-width: 0.1px;
        }

        .tsunami-area {
            fill: none; /* 塗りつぶさない */
            stroke-width: 1.5px; /* 線を太く */
            transition: stroke 0.5s;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .legend {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 4px;
            color: white; font-size: 14px; font-family: sans-serif;
            pointer-events: none; border: 1px solid #444;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .dot { width: 14px; height: 14px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--major-warning)"></div>大津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--warning)"></div>津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--advisory)"></div>津波注意報</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定を復元
        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const width = 1000;
        const height = 1000;
        const svg = d3.select("#map").append("svg").attr("viewBox", `0 0 ${width} ${height}`);
        const projection = d3.geoMercator();
        const path = d3.geoPath().projection(projection);

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];

            const landFeatures = topojson.feature(landData, landData.objects[landKey]);
            const tsunamiFeatures = topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]);

            // 陸地データに合わせて表示範囲を自動調整
            projection.fitExtent([[50, 50], [950, 950]], landFeatures);

            // 陸地を描画
            svg.append("g").selectAll("path")
                .data(landFeatures.features)
                .enter().append("path")
                .attr("class", "land")
                .attr("d", path);

            // 津波予報区の線を描画
            const areas = svg.append("g").selectAll("path")
                .data(tsunamiFeatures.features)
                .enter().append("path")
                .attr("class", "tsunami-area")
                .attr("id", d => `area-${d.properties.code || d.id}`)
                .attr("d", path)
                .style("stroke", "rgba(255,255,255,0.2)"); // 初期状態は薄い白

            // Firebaseの更新監視
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                areas.style("stroke", d => {
                    const code = d.properties.code || d.id;
                    const level = status[code];
                    if (level === 'major') return "var(--major-warning)";
                    if (level === 'warning') return "var(--warning)";
                    if (level === 'advisory') return "var(--advisory)";
                    return "rgba(255,255,255,0.2)";
                }).style("stroke-width", d => {
                    const code = d.properties.code || d.id;
                    return status[code] ? "3px" : "1.5px"; // 警報が出ている線は太くする
                });
            });
        }).catch(err => console.error("Loading Error:", err));
    </script>
</body>
</html>
