<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背面のカバー画像設定 */
        #background-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; /* 縦幅100% */
            z-index: -1;   /* 地図より背面に配置 */
            object-fit: cover; /* 画面いっぱいに広げる（比率維持） */
            opacity: 0.8;      /* 地図を見やすくするために少し暗くする場合 */
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 背景が透けて見えるように透明に */
            background: transparent; 
        }

        svg {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            object-fit: contain;
        }
        
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2px; transition: stroke 0.3s; }
    </style>
</head>
<body>

<!-- 背景画像 -->
<img id="background-cover" src="assets/cover/tsunami_cover.png" alt="background">

<div id="map-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive"
    };
    const db = getDatabase(initializeApp(config));

    async function loadAndFixMaps() {
        const [prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const container = d3.select("#map-container");

        // 各レイヤーのSVG要素を取得
        const prefSvg = container.append(() => prefXml.documentElement);
        const tsunamiSvg = container.append(() => tsunamiXml.documentElement);
        tsunamiSvg.style("position", "absolute");

        prefSvg.selectAll("path").classed("pref-path", true);
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        // 自動フィット関数
        const autoFit = (svgNode) => {
            const bbox = svgNode.getBBox();
            const margin = 10;
            svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
            svgNode.removeAttribute("width");
            svgNode.removeAttribute("height");
            svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
        };

        // 描画後にサイズ調整
        setTimeout(() => {
            autoFit(prefSvg.node());
            autoFit(tsunamiSvg.node());
        }, 100);

        // Firebase監視
        onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
            const data = snapshot.val() || {};
            tsunamiSvg.selectAll("path").each(function() {
                const code = d3.select(this).attr("id");
                const level = data[code];
                let color = "rgba(255,255,255,0.2)", width = "2px";

                if (level === 'major') { color = "#C91EFB"; width = "12px"; }
                else if (level === 'warning') { color = "#DE080A"; width = "9px"; }
                else if (level === 'advisory') { color = "#FEDC00"; width = "6px"; }

                d3.select(this).style("stroke", color).style("stroke-width", width);
            });
        });
    }

    loadAndFixMaps();
</script>
</body>
</html>
