<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --map-bg: #001233;
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        svg { width: 100%; height: 100%; }

        .land { fill: var(--land); stroke: #888; stroke-width: 0.2px; }

        /* 予報区は線のみ（塗りつぶしなし） */
        .tsunami-area {
            fill: none;
            stroke-width: 2px; /* 線を太めにする */
            transition: stroke 0.5s;
        }

        .legend {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 4px;
            color: white; font-size: 14px; font-family: sans-serif;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .dot { width: 16px; height: 16px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--major-warning)"></div>大津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--warning)"></div>津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--advisory)"></div>津波注意報</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定は省略（既存のものを使用）
        const app = initializeApp({ /* 設定 */ });
        const db = getDatabase(app);

        const svg = d3.select("#map").append("svg").attr("viewBox", "0 0 1000 1000");
        const projection = d3.geoMercator().center([138, 38]).scale(1800).translate([500, 500]);
        const path = d3.geoPath().projection(projection);

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];

            // 陸地
            svg.append("g").selectAll("path")
                .data(topojson.feature(landData, landData.objects[landKey]).features)
                .enter().append("path").attr("class", "land").attr("d", path);

            // 津波予報区（線のみ）
            const areas = svg.append("g").selectAll("path")
                .data(topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]).features)
                .enter().append("path")
                .attr("class", "tsunami-area")
                .attr("id", d => `area-${d.properties.code || d.id}`)
                .attr("d", path)
                .style("stroke", "#ffffff"); // 初期値は白（予報なし）

            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                areas.style("stroke", d => {
                    const code = d.properties.code || d.id;
                    const level = status[code];
                    if (level === 'major') return "var(--major-warning)";
                    if (level === 'warning') return "var(--warning)";
                    if (level === 'advisory') return "var(--advisory)";
                    return "#ffffff"; // 予報なしは白
                });
            });
        });
    </script>
</body>
</html>
