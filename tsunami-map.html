<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: transparent; /* iframe埋め込み用に背景を透過 */
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: flex-end; /* 右寄せ */
            align-items: center; 
            overflow: hidden; 
            position: relative; 
        }

        #main-canvas { 
            height: 100vh; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        #background-cover { 
            position: relative; 
            height: 100%; /* 縦幅100% */
            width: auto;   /* 横幅は自動計算 */
            z-index: -1; 
            display: block;
        }

        #map-container { 
            position: absolute;
            top: 0;
            left: -72px;
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: none; /* 下の要素の操作を邪魔しない */
        }
        
        svg { 
            position: absolute; 
            width: 90% !important; /* 画像より少し小さめに配置してバランスを調整 */
            height: 90% !important; 
            object-fit: contain; 
        }
        
        /* 陸地と都道府県境界 */
        .pref-path { fill: #BFBFBF; stroke: #BFBFBF; stroke-width: 0.5px; }
        
        /* 津波線の基本設定 */
        .tsunami-path { fill: none; stroke: none; transition: stroke 0.3s, stroke-width 0.3s; }
    </style>
</head>
<body>

<div id="main-canvas">
    <!-- 縦幅100%、横幅オートの設定 -->
    <img id="background-cover" src="assets/cover/tsunami_cover.png" alt="background">
    <div id="map-container"></div>
</div>

<script type="module">
    let tsunamiSvgElement = null;

    /**
     * 津波データを地図に反映させる関数
     * @param {Object} tsunamiSvg - D3で選択されたSVG要素
     * @param {Object} data - 津波情報データ
     */
    async function applyTsunamiData(tsunamiSvg, data) {
        if (!tsunamiSvg) return;

        // 全ての線をリセット
        tsunamiSvg.selectAll("path")
            .style("stroke", "none")
            .style("stroke-width", "0");

        if (!data || data.cancelled) return;

        data.areas.forEach(area => {
            const areaName = area.name.trim();
            const grade = area.grade;
            const baseWidth = 14; 
            
            let color = "none";
            let width = "0px";

            // 凡例に基づいた色分け
            if (grade === "MajorWarning") { 
                color = "#C91EFB"; // 大津波警報
                width = `${baseWidth * 2}px`;
            } 
            else if (grade === "Warning") { 
                color = "#DE080A"; // 津波警報
                width = `${baseWidth}px`; 
            } 
            else if (grade === "Watch") { 
                color = "#FEDC00"; // 津波注意報
                width = `${baseWidth}px`; 
            }

            const target = tsunamiSvg.selectAll("path").filter(function() {
                const id = d3.select(this).attr("id");
                return id && (id === areaName || id.includes(areaName));
            });

            if (!target.empty()) {
                target
                    .style("stroke", color)
                    .style("stroke-width", width)
                    .style("stroke-linecap", "round")
                    .style("stroke-linejoin", "round")
                    .raise();
            }
        });
    }

    async function init() {
        try {
            const [prefXml, tsunamiXml] = await Promise.all([
                d3.xml("assets/svg/pref.svg"),
                d3.xml("assets/svg/tsunami2_id.svg")
            ]);

            const container = d3.select("#map-container");
            const prefSvg = container.append(() => prefXml.documentElement);
            tsunamiSvgElement = container.append(() => tsunamiXml.documentElement);
            
            tsunamiSvgElement.style("position", "absolute").style("z-index", "10");
            prefSvg.selectAll("path").classed("pref-path", true);
            tsunamiSvgElement.selectAll("path").classed("tsunami-path", true);

            const autoFit = (svgNode) => {
                const bbox = svgNode.getBBox();
                const margin = 10;
                svgNode.setAttribute("viewBox", `${bbox.x - margin} ${bbox.y - margin} ${bbox.width + margin * 2} ${bbox.height + margin * 2}`);
                svgNode.removeAttribute("width");
                svgNode.removeAttribute("height");
                svgNode.setAttribute("preserveAspectRatio", "xMidYMid meet");
            };

            setTimeout(() => {
                autoFit(prefSvg.node());
                autoFit(tsunamiSvgElement.node());
                // 初期化時はデータなし
            }, 300);

        } catch (error) {
            console.error("読み込みに失敗しました:", error);
        }
    }

    // 外部（親ウィンドウなど）からデータを流し込めるようにグローバルに公開
    window.updateTsunamiMap = (data) => {
        applyTsunamiData(tsunamiSvgElement, data);
    };

    init();
</script>
</body>
</html>
