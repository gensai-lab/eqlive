<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVGのサイズ指定をCSSで完全に支配する */
        svg {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            /* 縦横比を維持しつつ、はみ出さないように収める */
            object-fit: contain; 
        }
        
        .pref-path { fill: #BFBFBF; stroke: #444; stroke-width: 0.2px; }
        .tsunami-path { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2px; transition: stroke 0.3s; }
    </style>
</head>
<body>

<div id="map-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
        databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
        projectId: "mgl-eqlive"
    };
    const db = getDatabase(initializeApp(config));

    async function loadMaps() {
        const [prefXml, tsunamiXml] = await Promise.all([
            d3.xml("assets/svg/pref.svg"),
            d3.xml("assets/svg/tsunami_id.svg")
        ]);

        const container = d3.select("#map-container");

        const processSvg = (xmlDoc) => {
            const svgElement = xmlDoc.documentElement;
            // SVGタグに直接書かれている width/height が悪さをしないよう削除
            svgElement.removeAttribute("width");
            svgElement.removeAttribute("height");
            // アスペクト比を維持するための設定を念のため追加
            svgElement.setAttribute("preserveAspectRatio", "xMidYMid meet");
            return svgElement;
        };

        // 都道府県レイヤー
        const prefSvg = container.append(() => processSvg(prefXml));
        prefSvg.selectAll("path").classed("pref-path", true);

        // 津波レイヤー
        const tsunamiSvg = container.append(() => processSvg(tsunamiXml));
        tsunamiSvg.selectAll("path").classed("tsunami-path", true);

        // Firebase監視
        onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
            const data = snapshot.val() || {};
            tsunamiSvg.selectAll("path").each(function() {
                const code = d3.select(this).attr("id");
                const level = data[code];
                
                let color = "rgba(255,255,255,0.2)";
                let width = "2px";

                if (level === 'major') { color = "#C91EFB"; width = "12px"; }
                else if (level === 'warning') { color = "#DE080A"; width = "9px"; }
                else if (level === 'advisory') { color = "#FEDC00"; width = "6px"; }

                d3.select(this).style("stroke", color).style("stroke-width", width);
            });
        });
    }

    loadMaps();
</script>
</body>
</html>
