<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --map-bg: #000000; /* 画像に合わせて黒に変更 */
            --no-tsunami: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        svg { width: 100%; height: 100%; }

        .land { fill: var(--land); stroke: #555; stroke-width: 0.2px; }
        .tsunami-area { fill: none; transition: stroke 0.5s; stroke-linejoin: round; }

        /* インセットの枠線 */
        .inset-border {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1px;
            opacity: 0.5;
        }

        .inset-label {
            fill: white;
            font-size: 18px;
            font-weight: bold;
        }

        .legend {
            position: absolute; bottom: 30px; right: 30px;
            color: white; font-size: 24px; font-weight: bold;
            display: flex; gap: 20px;
        }
        .legend-item { display: flex; flex-direction: column; align-items: center; }
        .bar { width: 50px; height: 10px; margin-bottom: 10px; }
        .v-text { writing-mode: vertical-rl; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="legend">
        <div class="legend-item"><div class="bar" style="background:var(--warning)"></div><span class="v-text">津波警報</span></div>
        <div class="legend-item"><div class="bar" style="background:var(--advisory)"></div><span class="v-text">津波注意報</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const svg = d3.select("#map").append("svg").attr("viewBox", "0 0 1000 600");

        // --- 投影設定 ---
        // 1. メイン（本州・北海道）
        const projMain = d3.geoMercator().center([138, 38.5]).scale(2400).translate([520, 300]);
        // 2. 沖縄・奄美（左上）
        const projOkinawa = d3.geoMercator().center([127, 26.5]).scale(1800).translate([150, 180]);
        // 3. 小笠原（右下）
        const projOgasawara = d3.geoMercator().center([142.2, 27]).scale(3500).translate([750, 480]);

        const pathMain = d3.geoPath().projection(projMain);
        const pathOkinawa = d3.geoPath().projection(projOkinawa);
        const pathOgasawara = d3.geoPath().projection(projOgasawara);

        // インセット枠の描画
        const drawInsetFrame = (x, y, w, h, label, labelX, labelY) => {
            const g = svg.append("g");
            g.append("path").attr("d", `M${x+w},${y} L${x},${y} L${x},${y+h} L${x+w/4},${y+h}`).attr("class", "inset-border");
            g.append("text").attr("x", labelX).attr("y", labelY).text(label).attr("class", "inset-label");
        };

        drawInsetFrame(20, 20, 300, 250, "沖縄・奄美", 40, 60);
        drawInsetFrame(600, 350, 250, 230, "小笠原", 630, 560);

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];
            const land = topojson.feature(landData, landData.objects[landKey]);
            const tsunami = topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]);

            const renderLayer = (gName, pathObj, clipId) => {
                const g = svg.append("g").attr("class", gName);
                
                // 陸地
                g.append("g").selectAll("path").data(land.features).enter().append("path")
                    .attr("class", "land").attr("d", pathObj);

                // 津波予報線
                return g.append("g").selectAll("path").data(tsunami.features).enter().append("path")
                    .attr("class", "tsunami-area").attr("d", pathObj)
                    .attr("id", d => `${gName}-${d.properties.code || d.id}`)
                    .style("stroke", "var(--no-tsunami)").style("stroke-width", "2.5px");
            };

            const areasMain = renderLayer("main", pathMain);
            const areasOki = renderLayer("oki", pathOkinawa);
            const areasOga = renderLayer("oga", pathOgasawara);

            // クリップ（枠外はみ出し防止）
            svg.append("defs").append("clipPath").attr("id", "clipOki")
                .append("rect").attr("x", 20).attr("y", 20).attr("width", 300).attr("height", 250);
            d3.select(".oki").attr("clip-path", "url(#clipOki)");

            svg.append("defs").append("clipPath").attr("id", "clipOga")
                .append("rect").attr("x", 600).attr("y", 350).attr("width", 250).attr("height", 230);
            d3.select(".oga").attr("clip-path", "url(#clipOga)");

            // Firebase連携
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                [areasMain, areasOki, areasOga].forEach(group => {
                    group.style("stroke", d => {
                        const code = d.properties.code || d.id;
                        const level = status[code];
                        if (level === 'major') return "var(--major-warning)";
                        if (level === 'warning') return "var(--warning)";
                        if (level === 'advisory') return "var(--advisory)";
                        return "var(--no-tsunami)";
                    }).style("stroke-width", d => status[d.properties.code || d.id] ? "5px" : "2.5px");
                });
            });
        });
    </script>
</body>
</html>
