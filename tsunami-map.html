<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --none: #00266e;
            --map-bg: #001233;
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .land {
            fill: var(--land);
            stroke: #888;
            stroke-width: 0.1px;
        }

        .tsunami-area {
            fill: var(--none);
            stroke: #ffffff;
            stroke-width: 0.3px;
            transition: fill 0.5s;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--major-warning)"></div>大津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--warning)"></div>津波警報</div>
        <div class="legend-item"><div class="dot" style="background:var(--advisory)"></div>津波注意報</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const width = 800;
        const height = 800;

        const svg = d3.select("#map").append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`);

        const projection = d3.geoMercator()
            .center([138, 38])
            .scale(1800)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            
            // デバッグ用: JSONの構造をコンソールに表示
            console.log("Land Data Objects:", Object.keys(landData.objects));
            console.log("Tsunami Data Objects:", Object.keys(tsunamiData.objects));

            // オブジェクト名の自動取得（最初のキーを使用する設定）
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];

            // 陸地
            svg.append("g")
                .selectAll("path")
                .data(topojson.feature(landData, landData.objects[landKey]).features)
                .enter().append("path")
                .attr("class", "land")
                .attr("d", path);

            // 津波予報区
            const areas = svg.append("g")
                .selectAll("path")
                .data(topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]).features)
                .enter().append("path")
                .attr("class", "tsunami-area")
                .attr("id", d => `area-${d.properties.code || d.id}`) 
                .attr("d", path);

            // Firebase連携
            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                areas.style("fill", d => {
                    const code = d.properties.code || d.id;
                    const level = status[code];
                    if (level === 'major') return "var(--major-warning)";
                    if (level === 'warning') return "var(--warning)";
                    if (level === 'advisory') return "var(--advisory)";
                    return "var(--none)";
                });
            });

        }).catch(error => {
            console.error("JSONの読み込みに失敗しました:", error);
        });
    </script>
</body>
</html>
