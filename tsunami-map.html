<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --major-warning: #C91EFB;
            --warning: #DE080A;
            --advisory: #FEDC00;
            --land: #BFBFBF;
            --map-bg: #000000;
            --no-tsunami: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            background-color: var(--map-bg);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg { width: 100%; height: 100%; }

        .land { fill: var(--land); stroke: #555; stroke-width: 0.1px; }
        .tsunami-area { fill: none; transition: stroke 0.5s; stroke-linejoin: round; stroke-linecap: round; }

        /* インセットの枠線デザイン */
        .inset-line {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.5px;
            opacity: 0.7;
        }

        .inset-label {
            fill: white;
            font-size: 22px;
            font-weight: bold;
            filter: drop-shadow(2px 2px 2px black);
        }

        /* 右下の凡例（画像に寄せる） */
        .legend {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 30px;
        }
        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-weight: bold;
        }
        .legend-bar {
            width: 60px;
            height: 12px;
            margin-bottom: 15px;
        }
        .v-text {
            writing-mode: vertical-rl;
            font-size: 28px;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-bar" style="background:var(--warning)"></div>
                <span class="v-text">津波警報</span>
            </div>
            <div class="legend-item">
                <div class="legend-bar" style="background:var(--advisory)"></div>
                <span class="v-text">津波注意報</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVjAU91VsGFbsdvhjoP7Dlk8C-Y4ibc",
            authDomain: "mgl-eqlive.firebaseapp.com",
            databaseURL: "https://mgl-eqlive-default-rtdb.firebaseio.com",
            projectId: "mgl-eqlive",
            storageBucket: "mgl-eqlive.firebasestorage.app",
            messagingSenderId: "1060231327645",
            appId: "1:1060231327645:web:642684f4640bbc21d5c974"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 画面比率に合わせたSVG作成
        const width = 1920;
        const height = 1080;
        const svg = d3.select("#map").append("svg").attr("viewBox", `0 0 ${width} ${height}`);

        // --- 投影設定（大きく表示されるよう調整） ---
        const projMain = d3.geoMercator().center([137.5, 38.3]).scale(3500).translate([width / 2 + 100, height / 2]);
        const projOkinawa = d3.geoMercator().center([127.5, 26.5]).scale(2500).translate([280, 300]);
        const projOgasawara = d3.geoMercator().center([142.2, 27.0]).scale(4500).translate([width - 550, height - 350]);

        const pathMain = d3.geoPath().projection(projMain);
        const pathOkinawa = d3.geoPath().projection(projOkinawa);
        const pathOgasawara = d3.geoPath().projection(projOgasawara);

        // インセット枠（L字デザイン）
        const drawInset = (x, y, w, h, label) => {
            const g = svg.append("g");
            // カギ型の線
            g.append("path").attr("class", "inset-line").attr("d", `M${x+w},${y} L${x},${y} L${x},${y+h} L${x+w/3},${y+h}`);
            g.append("text").attr("class", "inset-label").attr("x", x + 20).attr("y", y + 45).text(label);
        };

        drawInset(80, 100, 450, 400, "沖縄・奄美");
        drawInset(width - 750, height - 550, 400, 450, "小笠原");

        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/tsunami.json")
        ]).then(([landData, tsunamiData]) => {
            const landKey = Object.keys(landData.objects)[0];
            const tsunamiKey = Object.keys(tsunamiData.objects)[0];
            const land = topojson.feature(landData, landData.objects[landKey]);
            const tsunami = topojson.feature(tsunamiData, tsunamiData.objects[tsunamiKey]);

            const renderGroup = (name, pathGenerator, clipRect) => {
                const g = svg.append("g");
                if (clipRect) {
                    const clipId = `clip-${name}`;
                    svg.append("defs").append("clipPath").attr("id", clipId)
                       .append("rect").attr("x", clipRect.x).attr("y", clipRect.y).attr("width", clipRect.w).attr("height", clipRect.h);
                    g.attr("clip-path", `url(#${clipId})`);
                }

                g.append("g").selectAll("path").data(land.features).enter().append("path")
                    .attr("class", "land").attr("d", pathGenerator);

                return g.append("g").selectAll("path").data(tsunami.features).enter().append("path")
                    .attr("class", "tsunami-area").attr("d", pathGenerator)
                    .style("stroke", "var(--no-tsunami)").style("stroke-width", "3px");
            };

            const areasMain = renderGroup("main", pathMain, null);
            const areasOki = renderGroup("oki", pathOkinawa, {x:80, y:100, w:450, h:400});
            const areasOga = renderGroup("oga", pathOgasawara, {x:width-750, y:height-550, w:400, h:450});

            onValue(ref(db, 'broadcast/tsunami'), (snapshot) => {
                const status = snapshot.val() || {};
                [areasMain, areasOki, areasOga].forEach(group => {
                    group.style("stroke", d => {
                        const level = status[d.properties.code || d.id];
                        if (level === 'major') return "var(--major-warning)";
                        if (level === 'warning') return "var(--warning)";
                        if (level === 'advisory') return "var(--advisory)";
                        return "var(--no-tsunami)";
                    }).style("stroke-width", d => status[d.properties.code || d.id] ? "8px" : "3px");
                });
            });
        });
    </script>
</body>
</html>
